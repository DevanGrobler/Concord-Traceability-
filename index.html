<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concord Packaging Traceability</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ═══════════════════════════════════════════════════════════════

const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBvdGpqb2R1and0dnZuenR0cXNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjQ4OTMsImV4cCI6MjA5NDA0MDg5M30.aSjaRYN137kSGFnzscEiAvaQWkHdDXlGfjumdulxDsE ";
// ═══════════════════════════════════════════════════════════════

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const INK_ROWS   = ["Cyan","Magenta","Yellow","Black","White","Orange","Green","Varnish"]; // kept for reference only
const TIME_SLOTS = ["6:00","7:00","8:00","9:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];
const QC_CHECKS  = [
  "Plate mounted correctly","Doctor blade set","Impression pressure set","Register checked",
  "Ink viscosity within spec","Colour match approved","Print density checked","Trapping verified",
  "Slitting width correct","Tension set correctly","Rewind tension correct","Splice quality OK",
  "Defect-free print surface","No blocking/smearing","Correct substrate loaded","Batch code printed correctly",
  "Expiry date correct","Barcode verified","Seal integrity OK","Label placement correct",
  "Final visual inspection","Operator sign-off complete",
];

const C = {
  bg:"#0d1117",panel:"#161b22",border:"#30363d",
  accent:"#f0a500",accent2:"#e05a00",
  text:"#e6edf3",muted:"#8b949e",
  success:"#3fb950",danger:"#f85149",warn:"#d29922",blue:"#58a6ff",
};
const S = {
  btn:(v="accent",x={})=>({
    padding:"8px 18px",border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,
    fontSize:13,letterSpacing:"0.03em",transition:"all 0.15s",
    background:v==="accent"?C.accent:v==="danger"?C.danger:v==="ghost"?"transparent":C.panel,
    color:v==="ghost"?C.muted:"#fff",
    outline:v==="ghost"?`1px solid ${C.border}`:"none",...x,
  }),
  input:{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,color:C.text,padding:"8px 12px",fontSize:13,width:"100%",outline:"none"},
  label:{fontSize:12,color:C.muted,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase",display:"block",marginBottom:4},
  card:{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:20,marginBottom:16},
};
const TH = {padding:"6px 8px",textAlign:"left",color:C.muted,fontSize:10,fontWeight:700,letterSpacing:"0.06em",whiteSpace:"nowrap"};
const TD = {padding:"5px 8px",color:C.text,fontSize:11};
const todayStr = ()=>new Date().toISOString().split("T")[0];

// ── DB helpers ────────────────────────────────────────────────────────────────
const dbUsers   = async ()=>{ const {data}=await sb.from("users").select("*").order("created_at"); return data||[]; };
const dbRecords = async ()=>{ const {data}=await sb.from("records").select("*").order("created_at",{ascending:false}); return data||[]; };
const dbAddUser = async u=>sb.from("users").insert(u).select().single();
const dbDelUser = async id=>sb.from("users").delete().eq("id",id);
const dbAddRec  = async r=>sb.from("records").insert(r).select().single();
const dbDelRec  = async id=>sb.from("records").delete().eq("id",id);

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [users,   setUsers]   = useState([]);
  const [records, setRecords] = useState([]);
  const [session, setSession] = useState(()=>{ try{return JSON.parse(sessionStorage.getItem("cpk_sess"))||null;}catch{return null;} });
  const [status,  setStatus]  = useState("loading"); // loading | error | unconfigured | ok

  const reload = async () => {
    if (SUPABASE_URL==="PASTE_YOUR_SUPABASE_URL_HERE") { setStatus("unconfigured"); return; }
    try {
      const [u,r] = await Promise.all([dbUsers(), dbRecords()]);
      setUsers(u); setRecords(r); setStatus("ok");
    } catch { setStatus("error"); }
  };

  useEffect(()=>{ reload(); },[]);

  const login  = u=>{ setSession(u); sessionStorage.setItem("cpk_sess",JSON.stringify(u)); };
  const logout = ()=>{ setSession(null); sessionStorage.removeItem("cpk_sess"); };

  if (status==="loading")      return <Splash msg="Connecting to database…" />;
  if (status==="unconfigured") return <ConfigScreen />;
  if (status==="error")        return <Splash msg="Could not reach database. Check your credentials." />;
  if (!session)                return <Login users={users} onLogin={login} />;
  return <Main session={session} users={users} records={records} onLogout={logout} reload={reload} />;
}

function Splash({ msg }) {
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>
    <div style={{fontSize:22,fontWeight:800,color:C.accent}}>CONCORD</div>
    <div style={{fontSize:12,color:C.muted}}>{msg}</div>
  </div>;
}

function ConfigScreen() {
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{...S.card,maxWidth:560,padding:40}}>
      <div style={{fontSize:22,fontWeight:800,color:C.accent,marginBottom:4}}>CONCORD</div>
      <div style={{fontSize:15,fontWeight:700,color:C.danger,marginBottom:20}}>Database not configured yet</div>
      <div style={{color:C.text,fontSize:13,lineHeight:2.2}}>
        Open <code style={{color:C.accent,background:C.bg,padding:"1px 6px",borderRadius:4}}>index.html</code> in Notepad and replace these two lines near the top:<br/>
        <code style={{color:C.warn,fontSize:12}}>PASTE_YOUR_SUPABASE_URL_HERE</code><br/>
        <code style={{color:C.warn,fontSize:12}}>PASTE_YOUR_SUPABASE_ANON_KEY_HERE</code><br/><br/>
        with your real Supabase URL and anon key.<br/>
        Follow the setup guide that came with this file.
      </div>
    </div>
  </div>;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function Login({ users, onLogin }) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState("");
  const go = () => {
    const found = users.find(x=>x.username===u&&x.password===p);
    if (found) { setErr(""); onLogin(found); } else setErr("Invalid username or password.");
  };
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{...S.card,width:360,padding:40}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:28,fontWeight:800,color:C.accent,letterSpacing:"-0.02em"}}>CONCORD</div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"0.2em",marginTop:2}}>PACKAGING TRACEABILITY</div>
      </div>
      <label style={S.label}>Username</label>
      <input style={{...S.input,marginBottom:14}} value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} />
      <label style={S.label}>Password</label>
      <input type="password" style={{...S.input,marginBottom:20}} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} />
      {err && <div style={{color:C.danger,fontSize:12,marginBottom:12}}>{err}</div>}
      <button style={{...S.btn("accent"),width:"100%",padding:12,fontSize:14}} onClick={go}>Sign In</button>
    </div>
  </div>;
}

// ── All possible tabs with their sheet keys ───────────────────────────────────
const ALL_TABS = [
  {id:"dashboard", label:"Dashboard",        icon:"◈"},
  {id:"production",label:"Daily Production", icon:"▤"},
  {id:"viscosity", label:"Viscosity QC",     icon:"◉"},
  {id:"printingqc",label:"Printing QC",      icon:"✓"},
  {id:"records",   label:"All Records",      icon:"☰"},
  {id:"users",     label:"User Mgmt",        icon:"⌖"},
  {id:"debug",     label:"Debug / AI Help",  icon:"⚙"},
  {id:"password",  label:"Change Password",  icon:"🔑"},
];

// Default permissions per role — can be overridden per user via permissions field
const ROLE_DEFAULTS = {
  admin:    ["dashboard","production","viscosity","printingqc","records","users","debug","password"],
  operator: ["dashboard","production","records","password"],
  qc:       ["dashboard","viscosity","printingqc","records","password"],
  viewer:   ["dashboard","records","password"],
};

function getTabs(user) {
  if (!user) return [];
  if (user.role === "admin") return ALL_TABS; // admin always gets everything
  const perms = user.permissions || ROLE_DEFAULTS[user.role] || ["dashboard","records"];
  return ALL_TABS.filter(t => perms.includes(t.id));
}

function canEdit(user)   { return user?.role === "admin"; }
function canDelete(user) { return user?.role === "admin"; }

function Main({ session, users, records, onLogout, reload }) {
  const [tab, setTab]     = useState("dashboard");
  const [saving, setSaving] = useState(false);
  const [toast, setToast]   = useState(null);

  const flash = (msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const addRecord = async rec => {
    setSaving(true);
    const {error} = await dbAddRec({...rec, created_by:session.name, created_at:new Date().toISOString()});
    if (error) flash("Save failed: "+error.message,"danger");
    else { await reload(); flash("Saved to database!"); setTab("records"); }
    setSaving(false);
  };

  const delRecord  = async id  => { await dbDelRec(id); await reload(); flash("Record deleted."); };
  const saveRecord = async (id,data) => { await sb.from("records").update({data}).eq("id",id); await reload(); flash("Record updated."); };
  const rc = r=>r==="admin"?C.accent2:r==="qc"?C.blue:r==="viewer"?C.muted:C.success;

  const visibleTabs = getTabs(session);

  // If current tab is no longer accessible, go to dashboard
  React.useEffect(()=>{ if(!visibleTabs.find(t=>t.id===tab)) setTab("dashboard"); },[session]);

  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
    {toast && <div style={{position:"fixed",top:16,right:16,zIndex:9999,padding:"12px 20px",borderRadius:8,
      background:toast.type==="danger"?C.danger:C.success,color:"#fff",fontSize:13,fontWeight:600,
      fontFamily:"'IBM Plex Mono',monospace",boxShadow:"0 4px 24px #0008"}}>{toast.msg}</div>}

    <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",alignItems:"center",gap:16,height:52,flexShrink:0}}>
      <span style={{fontSize:16,fontWeight:800,color:C.accent}}>CONCORD</span>
      <span style={{fontSize:10,color:C.muted,letterSpacing:"0.15em"}}>TRACEABILITY</span>
      <div style={{flex:1}}/>
      <button style={S.btn("ghost",{padding:"4px 10px",fontSize:11})} onClick={reload}>↻ Sync</button>
      <span style={{fontSize:12,color:C.muted}}>{session.name}</span>
      <span style={{fontSize:10,padding:"2px 8px",background:rc(session.role),borderRadius:4,color:"#fff",fontWeight:700}}>{session.role.toUpperCase()}</span>
      <button style={S.btn("ghost",{padding:"4px 12px",fontSize:12})} onClick={onLogout}>Logout</button>
    </div>

    <div style={{display:"flex",flex:1,overflow:"hidden"}}>
      <div style={{width:200,background:C.panel,borderRight:`1px solid ${C.border}`,padding:"16px 0",flexShrink:0,overflowY:"auto"}}>
        {visibleTabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:"block",width:"100%",textAlign:"left",padding:"10px 20px",border:"none",cursor:"pointer",
            background:tab===t.id?`${C.accent}22`:"transparent",color:tab===t.id?C.accent:C.muted,
            borderLeft:tab===t.id?`3px solid ${C.accent}`:"3px solid transparent",
            fontSize:12,fontWeight:600,letterSpacing:"0.04em",transition:"all 0.1s",
          }}><span style={{marginRight:8}}>{t.icon}</span>{t.label}</button>
        ))}
      </div>

      <div style={{flex:1,overflow:"auto",padding:28,position:"relative"}}>
        {saving && <div style={{position:"fixed",inset:0,background:"#000a",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{color:C.accent,fontSize:15,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace"}}>Saving to database…</div>
        </div>}
        {/* Forms are always mounted but hidden — preserves state when switching tabs */}
        <div style={{display:tab==="dashboard" ?"block":"none"}}><Dashboard records={records} session={session} /></div>
        <div style={{display:tab==="production"?"block":"none"}}><ProductionForm onSave={addRecord} /></div>
        <div style={{display:tab==="viscosity" ?"block":"none"}}><ViscosityForm  onSave={addRecord} /></div>
        <div style={{display:tab==="printingqc"?"block":"none"}}><PrintingQCForm onSave={addRecord} /></div>
        <div style={{display:tab==="records"   ?"block":"none"}}><Records records={records} session={session} onDelete={delRecord} onSave={saveRecord} /></div>
        <div style={{display:tab==="users"     ?"block":"none"}}><UserMgmt users={users} session={session} reload={reload} flash={flash} /></div>
        <div style={{display:tab==="debug"     ?"block":"none"}}><DebugPanel records={records} users={users} session={session} /></div>
        <div style={{display:tab==="password"  ?"block":"none"}}><ChangePassword session={session} flash={flash} /></div>
      </div>
    </div>
  </div>;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ records, session }) {
  const td2 = new Date().toDateString();
  const tr  = records.filter(r=>new Date(r.created_at).toDateString()===td2);
  const cnt = t=>records.filter(r=>r.type===t).length;
  const tc  = t=>tr.filter(r=>r.type===t).length;
  return <div>
    <PH title="Dashboard" sub={`Welcome back, ${session.name}`} />
    <div style={{display:"flex",gap:16,marginBottom:24,flexWrap:"wrap"}}>
      {[{label:"DAILY PRODUCTION",type:"production",color:C.accent,icon:"▤"},
        {label:"VISCOSITY QC",type:"viscosity",color:C.blue,icon:"◉"},
        {label:"PRINTING QC",type:"printingqc",color:C.success,icon:"✓"}].map(({label,type,color,icon})=>(
        <div key={type} style={{...S.card,flex:1,minWidth:180}}>
          <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",marginBottom:8}}>{label}</div>
          <div style={{fontSize:36,fontWeight:800,color}}>{tc(type)}</div>
          <div style={{fontSize:11,color:C.muted}}>today · {cnt(type)} total</div>
        </div>
      ))}
    </div>
    <div style={S.card}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:"0.08em",marginBottom:14}}>RECENT RECORDS</div>
      {records.length===0 && <div style={{color:C.muted,fontSize:13}}>No records yet.</div>}
      {records.slice(0,10).map(r=>{
        const color=r.type==="production"?C.accent:r.type==="viscosity"?C.blue:C.success;
        const icon=r.type==="production"?"▤":r.type==="viscosity"?"◉":"✓";
        return <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:16,color}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:C.text}}>{r.title}</div>
            <div style={{fontSize:11,color:C.muted}}>{r.created_by} · {new Date(r.created_at).toLocaleString()}</div>
          </div>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:color+"33",color}}>{r.type.toUpperCase()}</span>
        </div>;
      })}
    </div>
  </div>;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function PH({ title, sub }) {
  return <div style={{marginBottom:24}}>
    <div style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-0.01em"}}>{title}</div>
    {sub && <div style={{fontSize:12,color:C.muted,marginTop:2}}>{sub}</div>}
  </div>;
}
function SC({ title, children }) {
  return <div style={S.card}>
    <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.1em",marginBottom:14}}>{title.toUpperCase()}</div>
    {children}
  </div>;
}
function Grid({ cols, children }) { return <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:12}}>{children}</div>; }
function F({ label, children, col=1 }) {
  return <div style={{gridColumn:`span ${col}`}}><label style={S.label}>{label}</label>{children}</div>;
}
function TI({ value, onChange, type="text", placeholder="" }) {
  return <input type={type} style={S.input} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} />;
}
function TS({ value, onChange, options }) {
  return <select style={S.input} value={value} onChange={e=>onChange(e.target.value)}>
    <option value="">— Select —</option>
    {options.map(o=><option key={o} value={o}>{o}</option>)}
  </select>;
}
function THead({ cols, widths }) {
  const tpl=widths?widths.join(" "):cols.map(()=>"1fr").join(" ");
  return <div style={{display:"grid",gridTemplateColumns:tpl,gap:8,padding:"0 0 6px",borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
    {cols.map(c=><div key={c} style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:"0.08em"}}>{c.toUpperCase()}</div>)}
  </div>;
}
function Done({ label, reset }) {
  return <div style={{...S.card,textAlign:"center",padding:60}}>
    <div style={{fontSize:40,marginBottom:12}}>✓</div>
    <div style={{color:C.success,fontSize:16,fontWeight:700}}>{label} saved to shared database</div>
    <div style={{color:C.muted,fontSize:12,marginTop:8}}>All users can now see this record.</div>
    <button style={{...S.btn("accent"),marginTop:20}} onClick={reset}>Fill New Sheet</button>
  </div>;
}

// ── Production Form ───────────────────────────────────────────────────────────
const eP=()=>({material:"",batchNo:"",qty:"",unit:""});
const eI=()=>({inkCode:"",shade:"",supplier:"",qty:"",returned:""});
const eS=()=>({solvent:"",qty:"",returned:""});

function ProductionForm({ onSave }) {
  const [hdr,setHdr]=useState({date:todayStr(),shift:"",jobNo:"",customer:"",substrate:"",width:"",length:"",speed:"",operator:"",supervisor:""});
  const [rawIn,setRawIn]=useState([eP()]); const [rawOut,setRawOut]=useState([eP()]);
  const [inks,setInks]=useState([eI()]); const [solvents,setSolv]=useState([eS()]);
  const [remarks,setRemarks]=useState(""); const [saved,setSaved]=useState(false);
  const h=(k,v)=>setHdr(p=>({...p,[k]:v}));
  const as=(fn,i,k,v)=>fn(a=>a.map((r,x)=>x===i?{...r,[k]:v}:r));
  const aa=(fn,e)=>fn(a=>[...a,e()]); const ad=(fn,i)=>fn(a=>a.filter((_,x)=>x!==i));
  if (saved) return <Done label="Production Sheet" reset={()=>setSaved(false)} />;
  const save=async()=>{ await onSave({type:"production",title:`Production · ${hdr.jobNo||"(no job)"} · ${hdr.date}`,data:{header:hdr,rawIn,rawOut,inks,solvents,remarks}}); setSaved(true); };
  return <div>
    <PH title="Daily Production Sheet" sub="Record job details, materials, inks and solvents" />
    <SC title="Job Details">
      <Grid cols={4}>
        <F label="Date"><TI type="date" value={hdr.date} onChange={v=>h("date",v)} /></F>
        <F label="Shift"><TS value={hdr.shift} onChange={v=>h("shift",v)} options={["Day Shift","Night Shift"]} /></F>
        <F label="Job No."><TI value={hdr.jobNo} onChange={v=>h("jobNo",v)} placeholder="CPK-0001" /></F>
        <F label="Customer"><TI value={hdr.customer} onChange={v=>h("customer",v)} /></F>
        <F label="Substrate"><TI value={hdr.substrate} onChange={v=>h("substrate",v)} /></F>
        <F label="Width (mm)"><TI type="number" value={hdr.width} onChange={v=>h("width",v)} /></F>
        <F label="Length (m)"><TI type="number" value={hdr.length} onChange={v=>h("length",v)} /></F>
        <F label="Speed (m/min)"><TI type="number" value={hdr.speed} onChange={v=>h("speed",v)} /></F>
        <F label="Operator"><TI value={hdr.operator} onChange={v=>h("operator",v)} /></F>
        <F label="Supervisor"><TI value={hdr.supervisor} onChange={v=>h("supervisor",v)} /></F>
      </Grid>
    </SC>
    {[["Raw Material Input",rawIn,setRawIn,eP],["Raw Material Output",rawOut,setRawOut,eP]].map(([title,rows,setter,empty])=>(
      <SC key={title} title={title}>
        <THead cols={["Material","Batch No.","Qty","Unit",""]} widths={["2fr","1.5fr","1fr","1fr","40px"]} />
        {rows.map((r,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr 40px",gap:6,marginBottom:6,alignItems:"center"}}>
            <TI value={r.material} onChange={v=>as(setter,i,"material",v)} />
            <TI value={r.batchNo}  onChange={v=>as(setter,i,"batchNo",v)} />
            <TI type="number" value={r.qty} onChange={v=>as(setter,i,"qty",v)} />
            <TS value={r.unit} onChange={v=>as(setter,i,"unit",v)} options={["kg","L","m","rolls","pcs"]} />
            <button style={S.btn("danger",{padding:"4px 8px",fontSize:12})} onClick={()=>ad(setter,i)}>✕</button>
          </div>
        ))}

// ── Printing QC Form ──────────────────────────────────────────────────────────
function PrintingQCForm({ onSave }) {
  const [hdr,setHdr]=useState({date:todayStr(),shift:"",jobNo:"",customer:"",press:"",operator:"",inspector:""});
  const [checks,setChecks]=useState(()=>QC_CHECKS.map(label=>({label,result:"",comment:""})));
  const [overall,setOverall]=useState(""); const [remarks,setRemarks]=useState(""); const [saved,setSaved]=useState(false);
  const h=(k,v)=>setHdr(p=>({...p,[k]:v}));
  const sc=(i,k,v)=>setChecks(cs=>cs.map((c,x)=>x===i?{...c,[k]:v}:c));
  const passC=checks.filter(c=>c.result==="Pass").length;
  const failC=checks.filter(c=>c.result==="Fail").length;
  const naC  =checks.filter(c=>c.result==="N/A").length;
  if (saved) return <Done label="Printing QC" reset={()=>setSaved(false)} />;
  const save=async()=>{ await onSave({type:"printingqc",title:`Printing QC · ${hdr.jobNo||"(no job)"} · ${hdr.date}`,data:{header:hdr,checks,overallResult:overall,remarks}}); setSaved(true); };
  return <div>
    <PH title="Printing QC Form" sub="Complete all 22 check items then set overall result" />
    <SC title="Run Details">
      <Grid cols={4}>
        <F label="Date"><TI type="date" value={hdr.date} onChange={v=>h("date",v)} /></F>
        <F label="Shift"><TS value={hdr.shift} onChange={v=>h("shift",v)} options={["Day Shift","Night Shift"]} /></F>
        <F label="Job No."><TI value={hdr.jobNo} onChange={v=>h("jobNo",v)} /></F>
        <F label="Customer"><TI value={hdr.customer} onChange={v=>h("customer",v)} /></F>
        <F label="Press"><TI value={hdr.press} onChange={v=>h("press",v)} /></F>
        <F label="Operator"><TI value={hdr.operator} onChange={v=>h("operator",v)} /></F>
        <F label="Inspector" col={2}><TI value={hdr.inspector} onChange={v=>h("inspector",v)} /></F>
      </Grid>
    </SC>
    <SC title={`QC Checks · ${passC} Pass · ${failC} Fail · ${naC} N/A`}>
      <THead cols={["#","Check Item","Result","Comments"]} widths={["36px","2fr","150px","2fr"]} />
      {checks.map((c,i)=>(
        <div key={i} style={{display:"grid",gridTemplateColumns:"36px 2fr 150px 2fr",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
          <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>{i+1}</div>
          <div style={{fontSize:12,color:C.text}}>{c.label}</div>
          <div style={{display:"flex",gap:4}}>
            {["Pass","Fail","N/A"].map(opt=>(
              <button key={opt} onClick={()=>sc(i,"result",opt)} style={{
                flex:1,padding:"5px 2px",border:"none",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600,
                background:c.result===opt?(opt==="Pass"?C.success:opt==="Fail"?C.danger:C.muted):C.bg,
                color:c.result===opt?"#fff":C.muted,
                outline:c.result===opt?"none":`1px solid ${C.border}`,transition:"all 0.1s",
              }}>{opt}</button>
            ))}
          </div>
          <input style={{...S.input,padding:"5px 8px"}} value={c.comment} placeholder="Add comment…" onChange={e=>sc(i,"comment",e.target.value)} />
        </div>
      ))}
    </SC>
    <SC title="Overall Assessment">
      <div style={{display:"flex",gap:12,marginBottom:16}}>
        {["APPROVED","CONDITIONAL","REJECTED"].map(opt=>(
          <button key={opt} onClick={()=>setOverall(opt)} style={{
            flex:1,padding:"12px 0",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,letterSpacing:"0.04em",
            background:overall===opt?(opt==="APPROVED"?C.success:opt==="REJECTED"?C.danger:C.warn):C.bg,

  </div>;
}

// ── Excel Export ──────────────────────────────────────────────────────────────
function exportToExcel(records) {
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Summary
  const summaryData = [
    ["Concord Packaging Traceability — Export"],
    ["Generated:", new Date().toLocaleString()],
    ["Total Records:", records.length],
    [],
    ["ID","Type","Title","Completed By","Date & Time"],
    ...records.map(r=>[r.id, r.type, r.title, r.created_by, new Date(r.created_at).toLocaleString()])
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryData), "Summary");

  // ── Sheet 2: Production
  const prodRecs = records.filter(r=>r.type==="production");
  if (prodRecs.length) {
    const rows = [["Completed By","Date","Shift","Job No.","Customer","Substrate","Width","Length","Speed","Operator","Supervisor","Remarks"]];
    prodRecs.forEach(r=>{
      const h=r.data?.header||{};
      rows.push([r.created_by, h.date,h.shift,h.jobNo,h.customer,h.substrate,h.width,h.length,h.speed,h.operator,h.supervisor,r.data?.remarks||""]);
      // Raw material input
      if (r.data?.rawIn?.length) {
        rows.push([]); rows.push(["  RAW MATERIAL INPUT","Material","Batch No.","Qty","Unit"]);
        r.data.rawIn.forEach(x=>rows.push(["",x.material,x.batchNo,x.qty,x.unit]));
      }
      // Raw material output
      if (r.data?.rawOut?.length) {
        rows.push([]); rows.push(["  RAW MATERIAL OUTPUT","Material","Batch No.","Qty","Unit"]);
        r.data.rawOut.forEach(x=>rows.push(["",x.material,x.batchNo,x.qty,x.unit]));
      }
      // Inks
      if (r.data?.inks?.length) {
        rows.push([]); rows.push(["  INK INPUT","Ink Code","Shade","Supplier","Qty Used (kg)","Returned (kg)"]);
        r.data.inks.forEach(x=>rows.push(["",x.inkCode,x.shade,x.supplier,x.qty,x.returned]));
      }
      // Solvents
      if (r.data?.solvents?.length) {
        rows.push([]); rows.push(["  SOLVENT INPUT","Solvent","Qty Used (L)","Returned (L)"]);
        r.data.solvents.forEach(x=>rows.push(["",x.solvent,x.qty,x.returned]));
      }
      rows.push(["---"]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Production");
  }

  // ── Sheet 3: Viscosity QC
  const viscRecs = records.filter(r=>r.type==="viscosity");
  if (viscRecs.length) {
    const rows = [["Completed By","Date","Shift","Job No.","Press","Operator","Ink Name","Ink Type","Target","Unit",...TIME_SLOTS]];
    viscRecs.forEach(r=>{
      const h=r.data?.header||{};
      (r.data?.readings||[]).forEach((row,i)=>{
        rows.push([
          i===0?r.created_by:"", i===0?h.date:"", i===0?h.shift:"", i===0?h.jobNo:"",
          i===0?h.press:"", i===0?h.operator:"",
          row.ink, row.type||"", row.target, row.unit,
          ...TIME_SLOTS.map(t=>row.times?.[t]||"")
        ]);
      });
      rows.push(["---"]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Viscosity QC");
  }

  // ── Sheet 4: Printing QC
  const qcRecs = records.filter(r=>r.type==="printingqc");
  if (qcRecs.length) {
    const rows = [["Completed By","Date","Shift","Job No.","Customer","Press","Operator","Inspector","Overall Result","#","Check Item","Result","Comment"]];
    qcRecs.forEach(r=>{
      const h=r.data?.header||{};
      (r.data?.checks||[]).forEach((c,i)=>{
        rows.push([
          i===0?r.created_by:"", i===0?h.date:"", i===0?h.shift:"", i===0?h.jobNo:"",
          i===0?h.customer:"", i===0?h.press:"", i===0?h.operator:"", i===0?h.inspector:"",
          i===0?(r.data?.overallResult||""):"",
          i+1, c.label, c.result, c.comment
        ]);
      });
      rows.push(["---"]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Printing QC");
  }

  XLSX.writeFile(wb, `Concord-Traceability-${new Date().toISOString().split("T")[0]}.xlsx`);
}

// ── Records ───────────────────────────────────────────────────────────────────
function Records({ records, session, onDelete, onSave }) {
  const [filter,setFilter]=useState("all"); const [search,setSearch]=useState("");
  const [exp,setExp]=useState(null); const [editing,setEditing]=useState(null);
  const filtered=records.filter(r=>(filter==="all"||r.type===filter)&&(search===""||r.title.toLowerCase().includes(search.toLowerCase())));
  const isAdmin = session.role==="admin";

  return <div>
    <PH title="All Records" sub={`${records.length} records shared across all devices`} />
    <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
      {["all","production","viscosity","printingqc"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)} style={S.btn(filter===f?"accent":"ghost",{padding:"6px 14px",fontSize:11})}>
          {f==="all"?"All":f==="production"?"Production":f==="viscosity"?"Viscosity QC":"Printing QC"}
        </button>
      ))}
      <input style={{...S.input,width:220,padding:"6px 12px"}} value={search} placeholder="Search…" onChange={e=>setSearch(e.target.value)} />
      <div style={{flex:1}} />
      <button style={S.btn("accent",{padding:"6px 16px",fontSize:11,background:C.success})} onClick={()=>exportToExcel(filtered)}>
        ⬇ Export to Excel ({filtered.length})
      </button>
    </div>
    {filtered.length===0 && <div style={{color:C.muted,fontSize:13}}>No records found.</div>}
    {filtered.map(r=>{
      const color=r.type==="production"?C.accent:r.type==="viscosity"?C.blue:C.success;
      const icon=r.type==="production"?"▤":r.type==="viscosity"?"◉":"✓";
      const isExp=exp===r.id; const isEdit=editing===r.id;
      return <div key={r.id} style={{...S.card,marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>{setExp(isExp?null:r.id);setEditing(null);}}>
          <span style={{fontSize:18,color}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:C.text,fontWeight:600}}>{r.title}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:3,display:"flex",gap:12,flexWrap:"wrap"}}>
              <span>📋 Completed by: <span style={{color:C.accent,fontWeight:700}}>{r.created_by}</span></span>
              <span>🕐 {new Date(r.created_at).toLocaleString()}</span>
            </div>
          </div>
          <span style={{fontSize:10,color}}>{isExp?"▲":"▼"}</span>
          {isAdmin && <>
            <button style={S.btn("ghost",{padding:"4px 10px",fontSize:11,color:C.blue,outline:`1px solid ${C.blue}`})}
              onClick={e=>{e.stopPropagation();setExp(r.id);setEditing(isEdit?null:r.id);}}>
              {isEdit?"Cancel Edit":"✎ Edit"}
            </button>
            <button style={S.btn("danger",{padding:"4px 10px",fontSize:11})}
              onClick={e=>{e.stopPropagation();if(window.confirm("Delete this record?"))onDelete(r.id);}}>Delete</button>
          </>}
        </div>
        {isExp && !isEdit && <RecDetail r={r} createdBy={r.created_by} />}
        {isExp && isEdit  && <RecEdit r={r} onSave={async(data)=>{await onSave(r.id,data);setEditing(null);}} onCancel={()=>setEditing(null)} />}
      </div>;
    })}
  </div>;
}

// ── Inline record editor (admin only) ────────────────────────────────────────
function RecEdit({ r, onSave, onCancel }) {
  const [data, setData] = useState(JSON.parse(JSON.stringify(r.data||{})));
  const setH=(k,v)=>setData(d=>({...d,header:{...d.header,[k]:v}}));
  const setArr=(key,i,k,v)=>setData(d=>({...d,[key]:d[key].map((x,xi)=>xi===i?{...x,[k]:v}:x)}));
  const addArr=(key,empty)=>setData(d=>({...d,[key]:[...(d[key]||[]),empty]}));
  const delArr=(key,i)=>setData(d=>({...d,[key]:d[key].filter((_,xi)=>xi!==i)}));

  return <div style={{marginTop:16,paddingTop:16,borderTop:`2px solid ${C.accent}`,fontSize:12}}>
    <div style={{fontSize:11,fontWeight:700,color:C.accent,letterSpacing:"0.08em",marginBottom:14}}>EDITING RECORD — ADMIN MODE</div>

    {r.type==="production" && <EditProd data={data} setH={setH} setArr={setArr} addArr={addArr} delArr={delArr} setData={setData} />}
    {r.type==="viscosity"  && <EditVisc data={data} setH={setH} setArr={setArr} addArr={addArr} delArr={delArr} setData={setData} />}
    {r.type==="printingqc" && <EditQC   data={data} setH={setH} setArr={setArr} addArr={addArr} delArr={delArr} setData={setData} />}

    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button style={S.btn("accent",{padding:"8px 24px"})} onClick={()=>onSave(data)}>Save Changes</button>
      <button style={S.btn("ghost",{padding:"8px 24px"})} onClick={onCancel}>Cancel</button>
    </div>
  </div>;
}

// ── User Management ───────────────────────────────────────────────────────────
const SHEET_OPTIONS = [
  {id:"dashboard", label:"Dashboard"},
  {id:"production",label:"Daily Production"},
  {id:"viscosity", label:"Viscosity QC"},
  {id:"printingqc",label:"Printing QC"},
  {id:"records",   label:"All Records"},
];

function UserMgmt({ users, session, reload, flash }) {
  const [form,setForm]=useState({username:"",password:"",name:"",role:"operator",permissions:null});
  const [err,setErr]=useState("");
  const [editId,setEditId]=useState(null);
  const [editPerms,setEditPerms]=useState({});
  const [resetId,setResetId]=useState(null);
  const [resetPw,setResetPw]=useState("");
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));

  const add=async()=>{
    if (!form.username||!form.password||!form.name){setErr("All fields required.");return;}
    if (users.find(u=>u.username===form.username)){setErr("Username taken.");return;}
    // Use role defaults unless viewer (viewer gets only dashboard+records by default)
    const perms = form.role==="admin" ? null : (ROLE_DEFAULTS[form.role]||["dashboard","records"]);
    const {error}=await dbAddUser({username:form.username,password:form.password,name:form.name,role:form.role,permissions:perms});
    if (error){setErr("Error: "+error.message);return;}
    setForm({username:"",password:"",name:"",role:"operator",permissions:null});setErr("");
    await reload(); flash("User added.");
  };

  const del=async id=>{
    if (id===session.id){alert("Cannot delete yourself.");return;}
    await dbDelUser(id); await reload(); flash("User deleted.");
  };

  const startEdit=(u)=>{
    setEditId(u.id);
    const perms = u.permissions || ROLE_DEFAULTS[u.role] || ["dashboard","records"];
    setEditPerms(Object.fromEntries(perms.map(p=>[p,true])));
  };

  const savePerms=async(u)=>{
    const perms = SHEET_OPTIONS.map(s=>s.id).filter(id=>editPerms[id]);
    await sb.from("users").update({permissions:perms}).eq("id",u.id);
    await reload(); setEditId(null); flash("Permissions updated.");
  };

  const doReset=async(u)=>{
    if (!resetPw.trim()){flash("Password cannot be empty.","danger");return;}
    await sb.from("users").update({password:resetPw}).eq("id",u.id);
    setResetId(null); setResetPw(""); await reload(); flash(`Password reset for ${u.name}.`);
  };

  const togglePerm=(id)=>setEditPerms(p=>({...p,[id]:!p[id]}));
  const rc=r=>r==="admin"?C.accent2:r==="qc"?C.blue:r==="viewer"?C.muted:C.success;

  return <div>
    <PH title="User Management" sub="Control user roles and which sheets each user can access" />

    <SC title="Add New User">
      <Grid cols={4}>
        <F label="Full Name"><TI value={form.name} onChange={v=>f("name",v)} /></F>
        <F label="Username"><TI value={form.username} onChange={v=>f("username",v)} /></F>
        <F label="Password"><TI value={form.password} onChange={v=>f("password",v)} /></F>
        <F label="Role"><TS value={form.role} onChange={v=>f("role",v)} options={["admin","operator","qc","viewer"]} /></F>
      </Grid>
      <div style={{marginTop:10,fontSize:11,color:C.muted}}>
        Role defaults — Admin: all access · Operator: Production + Records · QC: Viscosity + Printing QC + Records · Viewer: Records only (read)
      </div>
      {err && <div style={{color:C.danger,fontSize:12,marginTop:8}}>{err}</div>}
      <button style={{...S.btn("accent"),marginTop:12}} onClick={add}>Add User</button>
    </SC>

    <SC title="Current Users & Permissions">
      {users.map(u=>(
        <div key={u.id} style={{borderBottom:`1px solid ${C.border}`,padding:"14px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{color:C.text,fontWeight:600,fontSize:13}}>{u.name}</div>
              <div style={{color:C.muted,fontSize:11,marginTop:2}}>{u.username}</div>
            </div>
            <span style={{fontSize:10,padding:"2px 10px",borderRadius:4,background:rc(u.role)+"33",color:rc(u.role),fontWeight:700}}>{u.role.toUpperCase()}</span>
            {u.role!=="admin" && (
              <button style={S.btn("ghost",{padding:"4px 12px",fontSize:11,color:C.blue,outline:`1px solid ${C.blue}`})}
                onClick={()=>editId===u.id?setEditId(null):startEdit(u)}>
                {editId===u.id?"Cancel":"✎ Edit Permissions"}
              </button>
            )}
            <button style={S.btn("ghost",{padding:"4px 12px",fontSize:11,color:C.warn,outline:`1px solid ${C.warn}`})}
              onClick={()=>{setResetId(resetId===u.id?null:u.id);setResetPw("");}}>
              {resetId===u.id?"Cancel":"🔑 Reset Password"}
            </button>
            <button style={S.btn("danger",{padding:"4px 10px",fontSize:11,opacity:u.id===session.id?0.4:1})} onClick={()=>del(u.id)}>Delete</button>
          </div>

          {/* Inline password reset */}
          {resetId===u.id && (
            <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center",padding:12,background:C.bg,borderRadius:6,border:`1px solid ${C.warn}`}}>
              <span style={{fontSize:11,color:C.warn,fontWeight:600,flexShrink:0}}>New password for {u.name}:</span>
              <input style={{...S.input,maxWidth:220,padding:"5px 10px"}} type="text" value={resetPw} placeholder="Enter new password" onChange={e=>setResetPw(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&doReset(u)} />
              <button style={S.btn("accent",{padding:"5px 16px",fontSize:12,background:C.warn})} onClick={()=>doReset(u)}>Save</button>
            </div>
          )}

          {/* Permission chips when not editing */}
          {editId!==u.id && u.role!=="admin" && (
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
              {(u.permissions||ROLE_DEFAULTS[u.role]||[]).map(p=>{
                const tab=ALL_TABS.find(t=>t.id===p);
                return tab ? <span key={p} style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:`${C.accent}22`,color:C.accent}}>{tab.icon} {tab.label}</span> : null;
              })}
            </div>
          )}

          {/* Permission editor */}
          {editId===u.id && (
            <div style={{marginTop:12,padding:14,background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.08em",marginBottom:10}}>SELECT ACCESSIBLE SHEETS</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14}}>
                {SHEET_OPTIONS.map(s=>(
                  <button key={s.id} onClick={()=>togglePerm(s.id)} style={{
                    padding:"6px 14px",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,
                    background:editPerms[s.id]?C.accent:C.panel,
                    color:editPerms[s.id]?"#fff":C.muted,
                    outline:editPerms[s.id]?"none":`1px solid ${C.border}`,
                    transition:"all 0.12s",
                  }}>{s.label}</button>
                ))}
              </div>
              <button style={S.btn("accent",{padding:"6px 20px",fontSize:12})} onClick={()=>savePerms(u)}>Save Permissions</button>
            </div>
          )}
        </div>
      ))}
    </SC>

    <SC title="Role Reference">
      <div style={{fontSize:12,color:C.muted,lineHeight:2.2}}>
        <div><span style={{color:C.accent2,fontWeight:700}}>Admin</span> — Full access to everything including User Mgmt, Debug, and editing/deleting any record.</div>
        <div><span style={{color:C.success,fontWeight:700}}>Operator</span> — Can fill Daily Production sheets and view All Records. Cannot edit or delete.</div>
        <div><span style={{color:C.blue,fontWeight:700}}>QC Officer</span> — Can fill Viscosity QC and Printing QC sheets and view All Records. Cannot edit or delete.</div>
        <div><span style={{color:C.muted,fontWeight:700}}>Viewer</span> — Read-only access. Can only view records they are given access to. Cannot fill any sheets.</div>
      </div>
    </SC>
  </div>;
}

// ── Change Password ───────────────────────────────────────────────────────────
function ChangePassword({ session, flash }) {
  const [current,setCurrent]=useState("");
  const [newPw,setNewPw]=useState("");
  const [confirm,setConfirm]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);

  const save = async () => {
    setErr("");
    // Verify current password against DB
    const {data} = await sb.from("users").select("password").eq("id",session.id).single();
    if (!data || data.password !== current) { setErr("Current password is incorrect."); return; }
    if (!newPw.trim()) { setErr("New password cannot be empty."); return; }
    if (newPw !== confirm) { setErr("New passwords do not match."); return; }
    if (newPw.length < 4) { setErr("Password must be at least 4 characters."); return; }
    const {error} = await sb.from("users").update({password:newPw}).eq("id",session.id);
    if (error) { setErr("Failed to update: "+error.message); return; }
    setCurrent(""); setNewPw(""); setConfirm(""); setDone(true);
    flash("Password changed successfully!");
    setTimeout(()=>setDone(false),3000);
  };

  return <div>
    <PH title="Change Password" sub={`Changing password for: ${session.name}`} />
    <div style={{...S.card,maxWidth:420}}>
      {done && <div style={{padding:"10px 14px",background:`${C.success}22`,border:`1px solid ${C.success}`,borderRadius:6,color:C.success,fontSize:13,fontWeight:600,marginBottom:16}}>
        ✓ Password changed successfully!
      </div>}
      <label style={S.label}>Current Password</label>
      <input type="password" style={{...S.input,marginBottom:14}} value={current} onChange={e=>setCurrent(e.target.value)} />
      <label style={S.label}>New Password</label>
      <input type="password" style={{...S.input,marginBottom:14}} value={newPw} onChange={e=>setNewPw(e.target.value)} />
      <label style={S.label}>Confirm New Password</label>
      <input type="password" style={{...S.input,marginBottom:16}} value={confirm} onChange={e=>setConfirm(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&save()} />
      {err && <div style={{color:C.danger,fontSize:12,marginBottom:12}}>{err}</div>}
      <button style={{...S.btn("accent"),width:"100%",padding:10}} onClick={save}>Update Password</button>
    </div>
  </div>;
}

// ── Debug Panel ───────────────────────────────────────────────────────────────
function DebugPanel({ records, users, session }) {
  const [copied, setCopied] = useState(false);

  const buildReport = () => {
    const lines = [];
    lines.push("=== CONCORD TRACEABILITY — DEBUG REPORT ===");
    lines.push(`Generated: ${new Date().toLocaleString()}`);
    lines.push(`Logged in as: ${session.name} (${session.role})`);
    lines.push(`Supabase URL: ${SUPABASE_URL}`);
    lines.push("");
    lines.push(`--- USERS (${users.length} total) ---`);
    users.forEach(u => lines.push(`  [${u.role}] ${u.name} — username: ${u.username} — id: ${u.id}`));
    lines.push("");
    lines.push(`--- RECORDS (${records.length} total) ---`);
    const byType = {production:0, viscosity:0, printingqc:0};
    records.forEach(r=>{ if(byType[r.type]!==undefined) byType[r.type]++; });
    lines.push(`  Production: ${byType.production}`);
    lines.push(`  Viscosity QC: ${byType.viscosity}`);
    lines.push(`  Printing QC: ${byType.printingqc}`);
    lines.push("");
    lines.push("--- LAST 5 RECORDS (full data) ---");
    records.slice(0,5).forEach((r,i) => {
      lines.push(`\n[${i+1}] ${r.title}`);
      lines.push(`  ID: ${r.id}`);
      lines.push(`  Type: ${r.type}`);
      lines.push(`  Completed by: ${r.created_by}`);
      lines.push(`  Created at: ${r.created_at}`);
      lines.push(`  Data: ${JSON.stringify(r.data, null, 2)}`);
    });
    lines.push("");
    lines.push("--- BROWSER INFO ---");
    lines.push(`  User Agent: ${navigator.userAgent}`);
    lines.push(`  URL: ${window.location.href}`);
    lines.push(`  Screen: ${window.screen.width}x${window.screen.height}`);
    lines.push("");
    lines.push("=== END OF REPORT ===");
    return lines.join("\n");
  };

  const report = buildReport();

  const copy = () => {
    navigator.clipboard.writeText(report).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2500); });
  };

  return <div>
    <PH title="Debug / AI Help" sub="Copy this report and paste it into Claude or any AI to get help" />
    <div style={{...S.card,marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.1em",marginBottom:12}}>HOW TO USE</div>
      <div style={{fontSize:13,color:C.text,lineHeight:2}}>
        1. Click <span style={{color:C.accent,fontWeight:700}}>Copy Report</span> below<br/>
        2. Open a new chat at <span style={{color:C.accent}}>claude.ai</span><br/>
        3. Paste the report and describe your problem<br/>
        4. Claude will understand the full app context and help you fix it
      </div>
    </div>
    <div style={{...S.card}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.1em"}}>REPORT PREVIEW</div>
        <button style={S.btn(copied?"ghost":"accent",{padding:"6px 18px",fontSize:12,background:copied?C.success:C.accent,color:"#fff"})} onClick={copy}>
          {copied ? "✓ Copied!" : "Copy Report"}
        </button>
      </div>
      <pre style={{
        background:C.bg, border:`1px solid ${C.border}`, borderRadius:6,
        padding:16, fontSize:11, color:C.muted, overflowX:"auto",
        maxHeight:480, overflowY:"auto", lineHeight:1.7, whiteSpace:"pre-wrap",
        wordBreak:"break-word"
      }}>{report}</pre>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
