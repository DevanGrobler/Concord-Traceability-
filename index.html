const dbUsers   = async ()=>{ const {data}=await sb.from("users").select("*").order("created_at"); return data||[]; };
const dbRecords = async ()=>{ const {data}=await sb.from("records").select("*").order("created_at",{ascending:false}); return data||[]; };

const dbFindOpenJobCard = async (type,jobNo)=>{
  const {data}=await sb.from("job_cards").select("*")
    .eq("type",type).eq("job_no",jobNo).eq("status","open").maybeSingle();
  return data||null;
};
const dbCreateJobCard = async (type,jobNo,header,createdBy)=>{
  const {data,error}=await sb.from("job_cards").insert({
    type,job_no:jobNo,header,status:"open",
    created_by:createdBy,created_at:new Date().toISOString()
  }).select().single();
  return {data,error};
};
const dbGetJobTransactions = async (jobCardId)=>{
  const {data}=await sb.from("job_transactions").select("*")
    .eq("job_card_id",jobCardId).order("saved_at",{ascending:true});
  return data||[];
};
const dbSaveTransaction = async (jobCardId,section,rowData,savedBy)=>{
  const {data,error}=await sb.from("job_transactions").insert({
    job_card_id:jobCardId,section,row_data:rowData,
    saved_by:savedBy,saved_at:new Date().toISOString()
  }).select().single();
  return {data,error};
};
const dbCompleteJobCard = async (jobCardId,completedBy,completionNote)=>{
  return sb.from("job_cards").update({
    status:"completed",completed_by:completedBy,
    completed_at:new Date().toISOString(),
    completion_note:completionNote
  }).eq("id",jobCardId);
};
const dbReopenJobCard = async (jobCardId,reopenedBy)=>{
  return sb.from("job_cards").update({
    status:"open",completed_by:null,completed_at:null,
    reopened_by:reopenedBy,reopened_at:new Date().toISOString()
  }).eq("id",jobCardId);
};
const dbDeleteTransaction = async (txId)=>sb.from("job_transactions").delete().eq("id",txId);

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [users,   setUsers]   = useState([]);
  const [records, setRecords] = useState([]);
  const [trashed, setTrashed] = useState([]);
  const [loginLog,setLoginLog]= useState([]);
  const [appLists,setAppLists]= useState(DEFAULT_LISTS);
  const [session, setSession] = useState(()=>{ try{return JSON.parse(sessionStorage.getItem("cpk_sess"))||null;}catch{return null;} });
  const [status,  setStatus]  = useState("loading"); // loading | error | unconfigured | ok

  const reload = async () => {
    if (SUPABASE_URL==="PASTE_YOUR_SUPABASE_URL_HERE") { setStatus("unconfigured"); return; }
    try {
      const [u,r,l,t,ll] = await Promise.all([dbUsers(), dbRecords(), dbGetLists(), dbGetTrash(), dbGetLoginLog()]);
      setUsers(u); setRecords(r); setTrashed(t); setLoginLog(ll);
      // Build lists map from DB, falling back to defaults
      const lmap = {...DEFAULT_LISTS};
      l.forEach(row=>{ try{ lmap[row.list_name]=JSON.parse(row.items); }catch{} });
      setAppLists(lmap);
      setStatus("ok");
    } catch { setStatus("error"); }
  };

  useEffect(()=>{ reload(); },[]);

  const login  = u=>{ setSession(u); sessionStorage.setItem("cpk_sess",JSON.stringify(u)); dbLogLogin(u); };
  const logout = ()=>{ setSession(null); sessionStorage.removeItem("cpk_sess"); };

  if (status==="loading")      return <Splash msg="Connecting to database…" />;
  if (status==="unconfigured") return <ConfigScreen />;
  if (status==="error")        return <Splash msg="Could not reach database. Check your credentials." />;
  if (!session)                return <Login users={users} onLogin={login} />;
  return <Main session={session} users={users} records={records} trashed={trashed} loginLog={loginLog} appLists={appLists} onLogout={logout} reload={reload} />;
}

// ── Login ─────────────────────────────────────────────────────────────────────
function Login({ users, onLogin }) {
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState("");
  const go = () => {
    const found = users.find(x=>x.username.toLowerCase()===u.toLowerCase()&&x.password===p);
    if (found) { setErr(""); onLogin(found); } else setErr("Invalid username or password.");
  };
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{...S.card,width:360,padding:40}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:28,fontWeight:800,color:C.accent,letterSpacing:"-0.02em"}}>CONCORD</div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"0.2em",marginTop:2}}>PACKAGING TRACEABILITY</div>
      </div>
      <label style={S.label}>Username</label>
      <input style={{...S.input,marginBottom:14}} value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} />
      <label style={S.label}>Password</label>
      <input type="password" style={{...S.input,marginBottom:20}} value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} />
      {err && <div style={{color:C.danger,fontSize:12,marginBottom:12}}>{err}</div>}
      <button style={{...S.btn("accent"),width:"100%",padding:12,fontSize:14}} onClick={go}>Sign In</button>
    </div>
  </div>;
}

// Default permissions per role — can be overridden per user via permissions field
const ROLE_DEFAULTS = {
  admin:    ["dashboard","production","viscosity","printingqc","lamination","laminationqc","extruder1","extruder1qc","extruder2","extruder2qc","slitting1","slitting1qc","slitting2","slitting2qc","bagmaking1","bagmaking1qc","bagmaking2","bagmaking2qc","bagmaking3","bagmaking3qc","bagmaking4","bagmaking4qc","records","users","trash","loginlog","lists","debug","password"],
  manager:  ["dashboard","production","viscosity","printingqc","lamination","laminationqc","extruder1","extruder1qc","extruder2","extruder2qc","slitting1","slitting1qc","slitting2","slitting2qc","bagmaking1","bagmaking1qc","bagmaking2","bagmaking2qc","bagmaking3","bagmaking3qc","bagmaking4","bagmaking4qc","records","lists","password"],

  qc:       ["dashboard","viscosity","printingqc","lamination","laminationqc","extruder1qc","extruder2qc","slitting1qc","slitting2qc","bagmaking1qc","bagmaking2qc","bagmaking3qc","bagmaking4qc","records","password"],
  viewer:   ["dashboard","records","password"],
};

function getTabs(user) {
  if (!user) return [];
  if (user.role === "admin") return ALL_TABS; // admin always gets everything
  const perms = user.permissions || ROLE_DEFAULTS[user.role] || ["dashboard","records"];
  return ALL_TABS.filter(t => perms.includes(t.id));
}

function canEdit(user)   { return user?.role === "admin"; }
function canDelete(user) { return user?.role === "admin"; }
function isManager(user) { return user?.role === "manager"; }

function Main({ session, users, records, trashed, loginLog, appLists, onLogout, reload }) {
  const [tab, setTab]     = useState("dashboard");
  const [saving, setSaving] = useState(false);
  const [toast, setToast]   = useState(null);

  const flash = (msg,type="success")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3000); };

  const addRecord = async rec => {
    setSaving(true);
    const {error} = await dbAddRec({...rec, created_by:session.name, created_at:new Date().toISOString()});
    if (error) flash("Save failed: "+error.message,"danger");
    else { await reload(); flash("Saved to database!"); setTab("records"); }
    setSaving(false);
  };

  const delRecord  = async id  => {
    const rec = records.find(r=>r.id===id);
    if (rec) await dbMoveToTrash(rec, session.name);
    await dbDelRec(id);
    await reload();
    flash("Record moved to trash.");
  };
  const restoreRecord = async rec => { await dbRestoreRec(rec); await reload(); flash("Record restored."); };
  const permDelete    = async id  => { await dbEmptyTrash(id); await reload(); flash("Permanently deleted."); };
  const saveRecord = async (id,data) => { await sb.from("records").update({data}).eq("id",id); await reload(); flash("Record updated."); };
  const reopenJobCard = async (jobCardId, recordId) => {
    if (!window.confirm("Reopen this job card? It will be removed from All Records and set back to open.")) return;
    await dbReopenJobCard(jobCardId, session.name);
    await dbDelRec(recordId);
    await reload();
    flash("Job card reopened.");
  };
  const rc = r=>r==="admin"?C.accent2:r==="manager"?C.accent:r==="qc"?C.blue:r==="viewer"?C.muted:C.success;

  const visibleTabs = getTabs(session);

  // If current tab is no longer accessible, go to dashboard
  React.useEffect(()=>{ if(!visibleTabs.find(t=>t.id===tab)) setTab("dashboard"); },[session]);

  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column"}}>
    {toast && <div style={{position:"fixed",top:16,right:16,zIndex:9999,padding:"12px 20px",borderRadius:8,
      background:toast.type==="danger"?C.danger:C.success,color:"#fff",fontSize:13,fontWeight:600,
      fontFamily:"'IBM Plex Mono',monospace",boxShadow:"0 4px 24px #0008"}}>{toast.msg}</div>}

        <div style={{display:tab==="bagmaking2"  ?"block":"none"}}><BagMakingForm    session={session} users={users} lists={appLists} machine={2} /></div>
        <div style={{display:tab==="bagmaking2qc"?"block":"none"}}><BagMakingQCForm  session={session} users={users} lists={appLists} machine={2} /></div>
        <div style={{display:tab==="bagmaking3"  ?"block":"none"}}><BagMakingForm    session={session} users={users} lists={appLists} machine={3} /></div>
        <div style={{display:tab==="bagmaking3qc"?"block":"none"}}><BagMakingQCForm  session={session} users={users} lists={appLists} machine={3} /></div>
        <div style={{display:tab==="bagmaking4"  ?"block":"none"}}><BagMakingForm    session={session} users={users} lists={appLists} machine={4} /></div>
        <div style={{display:tab==="bagmaking4qc"?"block":"none"}}><BagMakingQCForm  session={session} users={users} lists={appLists} machine={4} /></div>

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ records, session }) {
  const td2 = new Date().toDateString();
  const tr  = records.filter(r=>new Date(r.created_at).toDateString()===td2);
  const cnt = t=>records.filter(r=>r.type===t).length;
  const tc  = t=>tr.filter(r=>r.type===t).length;
  return <div>
    <PH title="Dashboard" sub={`Welcome back, ${session.name}`} />
    <div style={{display:"flex",gap:16,marginBottom:24,flexWrap:"wrap"}}>
      {[{label:"DAILY PRODUCTION PRINTING",type:"production",color:C.accent,icon:"▤"},
        {label:"VISCOSITY QC",type:"viscosity",color:C.blue,icon:"◉"},
        {label:"PRINTING QC",type:"printingqc",color:C.success,icon:"✓"},
        {label:"LAMINATION",type:"lamination",color:"#9b59b6",icon:"⬡"},
        {label:"LAMINATION QC",type:"laminationqc",color:"#27ae60",icon:"✦"},
        {label:"EXTRUDER 1",type:"extruder1",color:"#e67e22",icon:"▣"},
        {label:"EXTRUDER 1 QC",type:"extruder1qc",color:"#d35400",icon:"✧"},
        {label:"EXTRUDER 2",type:"extruder2",color:"#16a085",icon:"▣"},
        {label:"EXTRUDER 2 QC",type:"extruder2qc",color:"#1abc9c",icon:"✧"},
        {label:"SLITTING 1",type:"slitting1",color:"#8e44ad",icon:"⊟"},
        {label:"SLITTING 1 QC",type:"slitting1qc",color:"#6c3483",icon:"⊠"},
        {label:"SLITTING 2",type:"slitting2",color:"#2471a3",icon:"⊟"},
        {label:"SLITTING 2 QC",type:"slitting2qc",color:"#1a5276",icon:"⊠"},
        {label:"BAG MAKING 1",type:"bagmaking1",color:"#c0392b",icon:"◫"},
        {label:"BAG MAKING 1 QC",type:"bagmaking1qc",color:"#922b21",icon:"◻"},
        {label:"BAG MAKING 2",type:"bagmaking2",color:"#d68910",icon:"◫"},
        {label:"BAG MAKING 2 QC",type:"bagmaking2qc",color:"#b7770d",icon:"◻"},
        {label:"BAG MAKING 3",type:"bagmaking3",color:"#1e8bc3",icon:"◫"},
        {label:"BAG MAKING 3 QC",type:"bagmaking3qc",color:"#1a6fa0",icon:"◻"},
        {label:"BAG MAKING 4",type:"bagmaking4",color:"#27ae60",icon:"◫"},
        {label:"BAG MAKING 4 QC",type:"bagmaking4qc",color:"#1e8449",icon:"◻"}].map(({label,type,color,icon})=>(
        <div key={type} style={{...S.card,flex:1,minWidth:180}}>
          <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
          <div style={{fontSize:11,color:C.muted,letterSpacing:"0.08em",marginBottom:8}}>{label}</div>
          <div style={{fontSize:36,fontWeight:800,color}}>{tc(type)}</div>
          <div style={{fontSize:11,color:C.muted}}>today · {cnt(type)} total</div>
        </div>
      ))}
    </div>
    <div style={S.card}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:"0.08em",marginBottom:14}}>RECENT RECORDS</div>
      {records.length===0 && <div style={{color:C.muted,fontSize:13}}>No records yet.</div>}
      {records.slice(0,10).map(r=>{
        const typeMap={production:C.accent,viscosity:C.blue,printingqc:C.success,lamination:"#9b59b6",laminationqc:"#27ae60",extruder1:"#e67e22",extruder1qc:"#d35400",extruder2:"#16a085",extruder2qc:"#1abc9c",slitting1:"#8e44ad",slitting1qc:"#6c3483",slitting2:"#2471a3",slitting2qc:"#1a5276",bagmaking1:"#c0392b",bagmaking1qc:"#922b21",bagmaking2:"#d68910",bagmaking2qc:"#b7770d",bagmaking3:"#1e8bc3",bagmaking3qc:"#1a6fa0",bagmaking4:"#27ae60",bagmaking4qc:"#1e8449"};
        const iconMap={production:"▤",viscosity:"◉",printingqc:"✓",lamination:"⬡",laminationqc:"✦",extruder1:"▣",extruder1qc:"✧",extruder2:"▣",extruder2qc:"✧",slitting1:"⊟",slitting1qc:"⊠",slitting2:"⊟",slitting2qc:"⊠",bagmaking1:"◫",bagmaking1qc:"◻",bagmaking2:"◫",bagmaking2qc:"◻",bagmaking3:"◫",bagmaking3qc:"◻",bagmaking4:"◫",bagmaking4qc:"◻"};
        const color=typeMap[r.type]||C.muted;
        const icon=iconMap[r.type]||"▪";
        return <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
          <span style={{fontSize:16,color}}>{icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:C.text}}>{r.title}</div>
            <div style={{fontSize:11,color:C.muted}}>{r.created_by} · {new Date(r.created_at).toLocaleString()}</div>
          </div>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:color+"33",color}}>{r.type.toUpperCase()}</span>
        </div>;
      })}
    </div>
  </div>;
}

// ── UI helpers ────────────────────────────────────────────────────────────────

  return <div style={{marginBottom:24}}>
    <div style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:"-0.01em"}}>{title}</div>
    {sub && <div style={{fontSize:12,color:C.muted,marginTop:2}}>{sub}</div>}
  </div>;
}
function SC({ title, children }) {
  return <div style={S.card}>
    <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.1em",marginBottom:14}}>{title.toUpperCase()}</div>
    {children}
  </div>;
}
function Grid({ cols, children }) { return <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:12}}>{children}</div>; }
function F({ label, children, col=1 }) {
  return <div style={{gridColumn:`span ${col}`}}><label style={S.label}>{label}</label>{children}</div>;
}
function TI({ value, onChange, type="text", placeholder="" }) {
  return <input type={type} style={S.input} value={value} placeholder={placeholder} onChange={e=>onChange(e.target.value)} />;
}
function TS({ value, onChange, options }) {
  return <select style={S.input} value={value} onChange={e=>onChange(e.target.value)}>
    <option value="">— Select —</option>
    {options.map(o=><option key={o} value={o}>{o}</option>)}
  </select>;
}
function THead({ cols, widths }) {
  const tpl=widths?widths.join(" "):cols.map(()=>"1fr").join(" ");
  return <div style={{display:"grid",gridTemplateColumns:tpl,gap:8,padding:"0 0 6px",borderBottom:`1px solid ${C.border}`,marginBottom:8}}>
    {cols.map(c=><div key={c} style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:"0.08em"}}>{c.toUpperCase()}</div>)}
  </div>;
}
function Done({ label, reset }) {
  return <div style={{...S.card,textAlign:"center",padding:60}}>
    <div style={{fontSize:40,marginBottom:12}}>✓</div>
    <div style={{color:C.success,fontSize:16,fontWeight:700}}>{label} saved to shared database</div>
    <div style={{color:C.muted,fontSize:12,marginTop:8}}>All users can now see this record.</div>
    <button style={{...S.btn("accent"),marginTop:20}} onClick={reset}>Fill New Sheet</button>
  </div>;
}


// ── Job Card Shell ────────────────────────────────────────────────────────────
// Shared wrapper for all forms. Handles: find/create job card, live transactions,
// complete with summary, admin reopen.

function JobCardShell({ type, formLabel, session, lists, users, onComplete, children }) {
  // children is a render prop: children({ jc, txns, saveRow, phase })
  const [phase, setPhase]     = useState("lookup");   // lookup | header | active | summary | done
  const [jobNo, setJobNo]     = useState("");
  const [searching,setSearching]= useState(false);
  const [jc, setJc]           = useState(null);       // current job card row
  const [txns, setTxns]       = useState([]);         // saved transactions
  const [headerData,setHeaderData]= useState({});
  const [summaryNote,setSummaryNote]= useState("");
  const [saving,setSaving]    = useState(false);
  const [err,setErr]          = useState("");

  // Lookup job card by jobNo
  const lookup = async () => {
    if (!jobNo.trim()) { setErr("Please enter a Job No."); return; }
    setSearching(true); setErr("");
    const found = await dbFindOpenJobCard(type, jobNo.trim());
    if (found) {
      const txList = await dbGetJobTransactions(found.id);
      setJc(found); setTxns(txList); setHeaderData(found.header||{});
      setPhase("active");
    } else {
      setPhase("header");
    }
    setSearching(false);
  };

  // Create new job card with header
  const startJobCard = async (header) => {
    setSaving(true); setErr("");
    const {data,error} = await dbCreateJobCard(type, jobNo.trim(), header, session.name);
    if (error) { setErr("Could not create job card: "+error.message); setSaving(false); return; }
    setJc(data); setHeaderData(header); setTxns([]); setPhase("active");
    setSaving(false);
  };

  // Save a single row transaction
  const saveRow = async (section, rowData) => {
    if (!jc) return null;
    const {data,error} = await dbSaveTransaction(jc.id, section, rowData, session.name);
    if (error) { setErr("Save failed: "+error.message); return null; }
    setTxns(prev=>[...prev,data]);
    return data;
  };

  // Delete a transaction row (admin only)
  const deleteRow = async (txId) => {
    await dbDeleteTransaction(txId);
    setTxns(prev=>prev.filter(t=>t.id!==txId));
  };

  // Complete job card — show summary first
  const requestComplete = () => { setSummaryNote(""); setPhase("summary"); };

  const confirmComplete = async () => {
    setSaving(true);
    await dbCompleteJobCard(jc.id, session.name, summaryNote);
    // Also save to records table for All Records view
    const grouped = {};
    txns.forEach(t=>{ if(!grouped[t.section]) grouped[t.section]=[]; grouped[t.section].push(t.row_data); });
    await sb.from("records").insert({
      type, title:`${formLabel} · ${jc.job_no} · ${jc.created_at?.split("T")[0]}`,
      data:{header:headerData, transactions:grouped, completionNote:summaryNote, jobCardId:jc.id},
      created_by:session.name, created_at:new Date().toISOString()
    });
    setSaving(false);
    setPhase("done");
    if (onComplete) onComplete();
  };

  const fmtTime = iso => iso ? new Date(iso).toLocaleString("en-ZA",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "";

  // ── LOOKUP SCREEN ──
  if (phase==="lookup") return (
    <div>
      <PH title={formLabel} sub="Enter a Job No. to continue an existing job card or start a new one" />
      <SC title="Job No. Lookup">
        <div style={{display:"flex",gap:10,alignItems:"flex-end",maxWidth:480}}>
          <F label="Job No.">
            <TI value={jobNo} onChange={v=>{setJobNo(v);setErr("");}}
              placeholder="e.g. CPK-0001"
              onKeyDown={e=>e.key==="Enter"&&lookup()} />
          </F>
          <button style={{...S.btn("accent"),padding:"8px 24px",fontSize:13,flexShrink:0,marginBottom:1}}
            onClick={lookup} disabled={searching}>
            {searching?"Searching…":"→ Open"}
          </button>
        </div>
        {err && <div style={{color:C.danger,fontSize:12,marginTop:8}}>{err}</div>}
        <div style={{color:C.muted,fontSize:11,marginTop:12}}>
          If this Job No. already has an open card, it will load it. Otherwise you'll set up a new one.
        </div>
      </SC>
    </div>
  );

  // ── DONE SCREEN ──
  if (phase==="done") return (
    <div>
      <PH title={formLabel} sub="Job card completed" />
      <div style={{...S.card,textAlign:"center",padding:40}}>
        <div style={{fontSize:36,marginBottom:12}}>✅</div>
        <div style={{fontSize:18,fontWeight:700,color:C.success,marginBottom:8}}>Job Card Completed</div>
        <div style={{color:C.muted,fontSize:13,marginBottom:24}}>
          Job No. <strong style={{color:C.text}}>{jc?.job_no}</strong> has been finalised and saved to All Records.
        </div>
        <button style={{...S.btn("accent"),padding:"10px 28px"}}
          onClick={()=>{setPhase("lookup");setJobNo("");setJc(null);setTxns([]);setHeaderData({});}}>
          Start Another Job Card
        </button>
      </div>
    </div>
  );

  // ── SUMMARY/COMPLETE SCREEN ──
  if (phase==="summary") {
    const grouped = {};
    txns.forEach(t=>{ if(!grouped[t.section]) grouped[t.section]=[]; grouped[t.section].push(t); });
    return (
      <div>
        <PH title={`Complete Job Card — ${jc?.job_no}`} sub="Review all transactions before finalising" />
        <SC title="Job Card Header">
          <div style={{display:"flex",flexWrap:"wrap",gap:16}}>
            {Object.entries(headerData||{}).map(([k,v])=>v?(
              <div key={k} style={{minWidth:120}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{k.replace(/([A-Z])/g," $1")}</div>
                <div style={{fontSize:13,color:C.text}}>{String(v)}</div>
              </div>
            ):null)}
          </div>
        </SC>
        {Object.entries(grouped).map(([section,rows])=>(
          <SC key={section} title={section}>
            {rows.map((t,i)=>(
              <div key={i} style={{padding:"8px 10px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:10,color:C.muted,whiteSpace:"nowrap"}}>
                  {fmtTime(t.saved_at)} · <span style={{color:C.accent}}>{t.saved_by}</span>
                </span>
                {Object.entries(t.row_data||{}).map(([k,v])=>v?(
                  <span key={k} style={{fontSize:12}}>
                    <span style={{color:C.muted,fontSize:10}}>{k}: </span>
                    <span style={{color:C.text}}>{String(v)}</span>
                  </span>
                ):null)}
              </div>
            ))}
          </SC>
        ))}
        {txns.length===0 && <div style={{color:C.warn,fontSize:13,marginBottom:16,padding:"12px 16px",background:C.warn+"22",borderRadius:8,border:`1px solid ${C.warn}`}}>⚠ No transactions saved yet on this job card.</div>}
        <SC title="Completion Note (optional)">
          <textarea style={{...S.input,minHeight:60,resize:"vertical"}} value={summaryNote}
            onChange={e=>setSummaryNote(e.target.value)} placeholder="Any final notes or sign-off remarks…" />
        </SC>
        <div style={{display:"flex",gap:12}}>
          <button style={{...S.btn("ghost"),padding:"12px 28px"}} onClick={()=>setPhase("active")}>← Back</button>
          <button style={{...S.btn("accent"),padding:"12px 32px",fontSize:14}} onClick={confirmComplete} disabled={saving}>
            {saving?"Saving…":"✅ Confirm Complete Job Card"}
          </button>
        </div>
      </div>
    );
  }

  // ── HEADER SETUP (new job card) ──
  if (phase==="header") return (
    <div>
      <PH title={`New Job Card — ${jobNo}`} sub={`Set up the header for this ${formLabel} job card`} />
      {children({phase:"header", jobNo, startJobCard, saving, lists, users, session})}
    </div>
  );

  // ── ACTIVE (live capture) ──
  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,padding:"10px 16px",
        background:C.panel,borderRadius:8,border:`1px solid ${C.border}`}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:700}}>OPEN JOB CARD</div>
          <div style={{fontSize:15,fontWeight:700,color:C.accent}}>{jc?.job_no}</div>
          <div style={{fontSize:11,color:C.muted}}>Started by {jc?.created_by} · {fmtTime(jc?.created_at)} · {txns.length} transaction{txns.length!==1?"s":""} saved</div>
        </div>
        <button style={{...S.btn("accent"),padding:"8px 22px",fontSize:13}} onClick={requestComplete}>
          ✅ Complete Job Card
        </button>
      </div>
      {err && <div style={{color:C.danger,fontSize:12,marginBottom:10}}>{err}</div>}
      {children({phase:"active", jobNo, jc, txns, saveRow, deleteRow, setErr, lists, users, session})}
    </div>
  );
}

// ── Validation helper ────────────────────────────────────────────────────────
function useFormValidation() {
  const [errors, setErrors] = React.useState({});
  const validate = (fields) => {
    // fields = { fieldKey: { value, label } }
    const errs = {};
    Object.entries(fields).forEach(([k,{value,label}])=>{
      if (!value || !String(value).trim()) errs[k] = `${label} is required`;
    });
    setErrors(errs);
    return Object.keys(errs).length === 0;
  };
  const clear = (k) => setErrors(p=>{ const n={...p}; delete n[k]; return n; });
  return { errors, validate, clear, setErrors };
}
function ErrMsg({ msg }) {
  if (!msg) return null;
  return <div style={{color:C.danger,fontSize:10,marginTop:2,fontWeight:600}}>{msg}</div>;
}

// ── Transaction Row display helper ───────────────────────────────────────────
function TxnList({ txns, section, session, deleteRow, columns }) {
  const rows = txns.filter(t=>t.section===section);
  if (!rows.length) return null;
  return (
    <div style={{marginBottom:12}}>
      <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:6,letterSpacing:"0.05em"}}>SAVED ENTRIES</div>
      {rows.map((t,i)=>(
        <div key={t.id||i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",
          background:C.bg,borderRadius:6,border:`1px solid ${C.border}`,marginBottom:4,flexWrap:"wrap"}}>
          <span style={{fontSize:10,color:C.muted,whiteSpace:"nowrap",flexShrink:0}}>
            {new Date(t.saved_at).toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit"})}
            {" · "}<span style={{color:C.accent}}>{t.saved_by}</span>
          </span>
          {columns.map(col=>(t.row_data[col.key]!=null&&t.row_data[col.key]!=="")?
            <span key={col.key} style={{fontSize:12}}>
              <span style={{color:C.muted,fontSize:10}}>{col.label}: </span>
              <span style={{color:C.text,fontWeight:600}}>{String(t.row_data[col.key])}</span>
            </span>
          :null)}
          {session?.role==="admin" && deleteRow && (
            <button style={{...S.btn("danger",{padding:"1px 7px",fontSize:10}),marginLeft:"auto",flexShrink:0}}
              onClick={()=>deleteRow(t.id)}>✕</button>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Production Form ───────────────────────────────────────────────────────────
const eP=()=>({material:"",batchNo:"",qty:"",unit:""});
const eI=()=>({inkCode:"",shade:"",supplier:"",qty:"",returned:""});
const eS=()=>({solvent:"",qty:"",returned:""});

function ProductionFormInner({ phase, jobNo, startJobCard, saving, jc, txns=[], saveRow, deleteRow, setErr, lists={}, users=[], session }) {
  const [hdr,setHdr]=useState({date:todayStr(),shift:"",customer:"",productName:"",substrate:"",width:"",length:"",speed:"",operator:"",supervisor:""});
  const [rawInRow,  setRawInRow]  = useState(eP());
  const [rawOutRow, setRawOutRow] = useState(eP());
  const [inkRow,    setInkRow]    = useState(eI());
  const [solvRow,   setSolvRow]   = useState(eS());
  const [remarks,   setRemarks]   = useState("");
  const [savingRow, setSavingRow] = useState({});
  const {errors:fErr,validate,clear:clrErr} = useFormValidation();
  const operatorNames = (lists.operator||[]).length>0?(lists.operator||[]).map(String).filter(Boolean):users.filter(u=>u.role==="operator").map(u=>u.name);
  const h=(k,v)=>{clrErr(k);setHdr(p=>({...p,[k]:v}));};

  const doSaveRow = async (section, data, reset) => {
    setSavingRow(p=>({...p,[section]:true}));
    const res = await saveRow(section, data);
    if (res) reset();
    setSavingRow(p=>({...p,[section]:false}));
  };

  if (phase==="header") {
    return <div>
      <SC title="Job Details">
        <Grid cols={4}>
          <F label="Date"><TI type="date" value={hdr.date} onChange={v=>h("date",v)} /></F>
          <F label="Shift"><TS value={hdr.shift} onChange={v=>h("shift",v)} options={["Day Shift","Night Shift"]} /><ErrMsg msg={fErr.shift} /></F>
          <F label="Customer"><TS value={hdr.customer} onChange={v=>h("customer",v)} options={["",...(lists.customer||[]).map(String).filter(Boolean)]} /><ErrMsg msg={fErr.customer} /></F>
          <F label="Product Name"><TS value={hdr.productName} onChange={v=>h("productName",v)} options={["",...(lists.product_name||[]).map(String).filter(Boolean)]} /></F>
          <F label="Substrate"><TS value={hdr.substrate} onChange={v=>h("substrate",v)} options={["",...(lists.substrate||["BOPP","BOPP MAT","PET","PET MAT"]).map(String).filter(Boolean)]} /><ErrMsg msg={fErr.substrate} /></F>
          <F label="Width (mm)"><TS value={hdr.width} onChange={v=>h("width",v)} options={["",...(lists.width||[]).map(String).filter(Boolean)]} /></F>
          <F label="Length (m)"><TI type="number" value={hdr.length} onChange={v=>h("length",v)} /></F>
          <F label="Speed (m/min)"><TI type="number" value={hdr.speed} onChange={v=>h("speed",v)} /></F>
          <F label="Operator"><TS value={hdr.operator} onChange={v=>h("operator",v)} options={["", ...operatorNames]} /><ErrMsg msg={fErr.operator} /></F>
          <F label="Supervisor"><TS value={hdr.supervisor} onChange={v=>h("supervisor",v)} options={["",...(lists.supervisor||[]).map(String).filter(Boolean)]} /></F>
        </Grid>
      </SC>
      <button style={{...S.btn("accent"),padding:"12px 32px",fontSize:14}} disabled={saving}
        onClick={()=>{
          if(!validate({shift:{value:hdr.shift,label:"Shift"},customer:{value:hdr.customer,label:"Customer"},substrate:{value:hdr.substrate,label:"Substrate"},operator:{value:hdr.operator,label:"Operator"}})) return;
          startJobCard({...hdr,jobNo});
        }}>
        {saving?"Creating…":"▶ Start Job Card"}
      </button>
    </div>;
  }

  return <div>
    <SC title="Job Details" >
      <div style={{display:"flex",flexWrap:"wrap",gap:16}}>
        {Object.entries(jc?.header||{}).filter(([k,v])=>v&&k!=="jobNo").map(([k,v])=>(
          <div key={k}><div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{k.replace(/([A-Z])/g," $1")}</div><div style={{fontSize:13,color:C.text}}>{String(v)}</div></div>
        ))}
      </div>
    </SC>

    {[["Raw Material Input",rawInRow,setRawInRow,eP,[{key:"material",label:"Material"},{key:"batchNo",label:"Batch"},{key:"qty",label:"Qty"},{key:"unit",label:"Unit"}]],
      ["Raw Material Output",rawOutRow,setRawOutRow,eP,[{key:"material",label:"Material"},{key:"batchNo",label:"Batch"},{key:"qty",label:"Qty"},{key:"unit",label:"Unit"}]]].map(([title,row,setRow,empty,cols])=>(
      <SC key={title} title={title}>
        <TxnList txns={txns} section={title} session={session} deleteRow={deleteRow} columns={cols} />
        <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr 40px auto",gap:6,alignItems:"center"}}>
          <TI value={row.material} onChange={v=>setRow(p=>({...p,material:v}))} placeholder="Material" />
          <TI value={row.batchNo}  onChange={v=>setRow(p=>({...p,batchNo:v}))} placeholder="Batch No." />
          <TI type="number" value={row.qty} onChange={v=>setRow(p=>({...p,qty:v}))} placeholder="Qty" />
          <TS value={row.unit} onChange={v=>setRow(p=>({...p,unit:v}))} options={["",...(lists.unit||["kg","g","L","mL","m","mm","rolls","sheets"]).map(String).filter(Boolean)]} />
          <div/>
          <button style={{...S.btn("accent",{fontSize:11,padding:"6px 14px"}),whiteSpace:"nowrap"}} disabled={savingRow[title]}
            onClick={()=>doSaveRow(title,{...row},()=>{setRow(empty());})}>
            {savingRow[title]?"…":"💾 Save Row"}
          </button>
        </div>
      </SC>
    ))}

    <SC title="Ink Input">
      <TxnList txns={txns} section="Ink Input" session={session} deleteRow={deleteRow} columns={[{key:"inkCode",label:"Code"},{key:"shade",label:"Shade"},{key:"supplier",label:"Supplier"},{key:"qty",label:"Qty"},{key:"returned",label:"Returned"}]} />
      <div style={{display:"grid",gridTemplateColumns:"1.2fr 1.2fr 1.2fr 1fr 1fr auto",gap:6,alignItems:"center"}}>
        <TS value={inkRow.inkCode} onChange={v=>setInkRow(p=>({...p,inkCode:v}))} options={["",...(lists.ink_code||[]).map(x=>typeof x==="object"?`${x.code} — ${x.description}`:x)]} />
        <TS value={inkRow.shade}   onChange={v=>setInkRow(p=>({...p,shade:v}))}   options={["",...(lists.ink_shade||[]).map(String).filter(Boolean)]} />

        <TI type="number" value={inkRow.qty}      onChange={v=>setInkRow(p=>({...p,qty:v}))} placeholder="Qty kg" />
        <TI type="number" value={inkRow.returned} onChange={v=>setInkRow(p=>({...p,returned:v}))} placeholder="Returned" />
        <button style={{...S.btn("accent",{fontSize:11,padding:"6px 14px"}),whiteSpace:"nowrap"}} disabled={savingRow["Ink Input"]}
          onClick={()=>doSaveRow("Ink Input",{...inkRow},()=>setInkRow(eI()))}>
          {savingRow["Ink Input"]?"…":"💾 Save Row"}
        </button>
      </div>
    </SC>

    <SC title="Solvent Input">
      <TxnList txns={txns} section="Solvent Input" session={session} deleteRow={deleteRow} columns={[{key:"solvent",label:"Solvent"},{key:"qty",label:"Qty"},{key:"returned",label:"Returned"}]} />
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr auto",gap:6,alignItems:"center"}}>
        <TS value={solvRow.solvent} onChange={v=>setSolvRow(p=>({...p,solvent:v}))} options={["",...(lists.solvent||[]).map(String).filter(Boolean)]} />
        <TI type="number" value={solvRow.qty}      onChange={v=>setSolvRow(p=>({...p,qty:v}))} placeholder="Qty" />
        <TI type="number" value={solvRow.returned} onChange={v=>setSolvRow(p=>({...p,returned:v}))} placeholder="Returned" />
        <button style={{...S.btn("accent",{fontSize:11,padding:"6px 14px"}),whiteSpace:"nowrap"}} disabled={savingRow["Solvent Input"]}
          onClick={()=>doSaveRow("Solvent Input",{...solvRow},()=>setSolvRow(eS()))}>
          {savingRow["Solvent Input"]?"…":"💾 Save Row"}
        </button>
      </div>
    </SC>

    <SC title="Remarks">
      <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
        <textarea style={{...S.input,minHeight:60,resize:"vertical",flex:1}} value={remarks} onChange={e=>setRemarks(e.target.value)} placeholder="Add a remark…" />
        <button style={{...S.btn("ghost",{fontSize:11,padding:"8px 14px"}),flexShrink:0}} disabled={savingRow["Remarks"]||!remarks.trim()}
          onClick={()=>doSaveRow("Remarks",{text:remarks},()=>setRemarks(""))}>
          {savingRow["Remarks"]?"…":"💾 Save Remark"}
        </button>
      </div>
      <TxnList txns={txns} section="Remarks" session={session} deleteRow={deleteRow} columns={[{key:"text",label:"Note"}]} />
    </SC>
  </div>;
}

    <PH title="Daily Production Sheet Printing" sub="Live capture — each row saves immediately, linked to this job card" />

// ── Generic QC Form Inner ────────────────────────────────────────────────────
function QCFormInner({ phase, jobNo, startJobCard, saving, jc, txns=[], saveRow, deleteRow, setErr, lists={}, users=[], session, checkListKey, qcLabel }) {
  const [hdr,setHdr] = useState({date:todayStr(),shift:"",customer:"",productName:"",operator:"",inspector:""});
  const [savingHdr, setSavingHdr] = useState(false);
  const {errors:fErr,validate,clear:clrErr} = useFormValidation();
  const operatorNames = (lists.operator||[]).length>0?(lists.operator||[]).map(String).filter(Boolean):users.filter(u=>u.role==="operator").map(u=>u.name);
  const qcNames = (lists.qc_officer||[]).map(String).filter(Boolean);
  const checkLabels = (lists[checkListKey]||[]).map(String).filter(Boolean);
  const h=(k,v)=>{clrErr(k);setHdr(p=>({...p,[k]:v}));};
  const [checkStates,setCheckStates] = useState({});
  const [overall,setOverall] = useState("");
  const [remark,setRemark]   = useState("");
  const [savingRow,setSavingRow] = useState({});

  const doSave = async (section,data,reset)=>{
    setSavingRow(p=>({...p,[section]:true}));
    const res = await saveRow(section,data);
    if(res) reset();
    setSavingRow(p=>({...p,[section]:false}));
  };

  if (phase==="header") return <div>
    <SC title="Run Details">
      <Grid cols={4}>
        <F label="Date"><TI type="date" value={hdr.date} onChange={v=>h("date",v)} /></F>
        <F label="Shift"><TS value={hdr.shift} onChange={v=>h("shift",v)} options={["Day Shift","Night Shift"]} /><ErrMsg msg={fErr.shift} /></F>
        <F label="Customer"><TS value={hdr.customer} onChange={v=>h("customer",v)} options={["",...(lists.customer||[]).map(String).filter(Boolean)]} /><ErrMsg msg={fErr.customer} /></F>
        <F label="Product Name"><TS value={hdr.productName} onChange={v=>h("productName",v)} options={["",...(lists.product_name||[]).map(String).filter(Boolean)]} /></F>
        <F label="Operator"><TS value={hdr.operator} onChange={v=>h("operator",v)} options={["", ...operatorNames]} /><ErrMsg msg={fErr.operator} /></F>
        <F label="Inspector / QC Officer" col={2}><TS value={hdr.inspector} onChange={v=>h("inspector",v)} options={["", ...qcNames]} /><ErrMsg msg={fErr.inspector} /></F>
      </Grid>
    </SC>
    <button style={{...S.btn("accent"),padding:"12px 32px",fontSize:14}} disabled={saving}
      onClick={()=>{
        if(!validate({shift:{value:hdr.shift,label:"Shift"},customer:{value:hdr.customer,label:"Customer"},operator:{value:hdr.operator,label:"Operator"},inspector:{value:hdr.inspector,label:"Inspector"}})) return;
        startJobCard({...hdr,jobNo});
      }}>{saving?"Creating…":"▶ Start Job Card"}</button>
  </div>;

  const savedChecks = txns.filter(t=>t.section==="QC Check");
  const savedCheckMap = {};
  savedChecks.forEach(t=>{ savedCheckMap[t.row_data.label]={result:t.row_data.result,comment:t.row_data.comment,txId:t.id}; });

  return <div>
    <SC title="Run Details">
      <div style={{display:"flex",flexWrap:"wrap",gap:16}}>
        {Object.entries(jc?.header||{}).filter(([k,v])=>v&&k!=="jobNo").map(([k,v])=>(
          <div key={k}><div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{k.replace(/([A-Z])/g," $1")}</div><div style={{fontSize:13,color:C.text}}>{String(v)}</div></div>
        ))}
      </div>
    </SC>
    {checkLabels.length===0 && (
      <div style={{background:C.warn+"22",border:`1px solid ${C.warn}`,borderRadius:8,padding:"14px 18px",marginBottom:16,fontSize:13,color:C.warn}}>
        ⚠ No check items configured yet. Go to <strong>Lists / Settings → {qcLabel} QC Checks</strong> to add them.
      </div>
    )}
    {checkLabels.length>0 && (
      <SC title={`QC Checks (${checkLabels.length} items)`}>
        <THead cols={["#","Check Item","Result","Comment",""]} widths={["36px","2fr","130px","2fr","auto"]} />
        {checkLabels.map((label,i)=>{
          const saved=savedCheckMap[label];
          const st=checkStates[label]||{result:"",comment:""};
          return <div key={i} style={{display:"grid",gridTemplateColumns:"36px 2fr 130px 2fr auto",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}>
            <div style={{fontSize:11,color:C.muted,textAlign:"center"}}>{i+1}</div>
            <div style={{fontSize:12,color:saved?C.success:C.text,fontWeight:saved?"700":"400"}}>
              {label}{saved&&<span style={{fontSize:10,marginLeft:6,color:C.muted}}>✓ saved</span>}
            </div>
            <div style={{display:"flex",gap:3}}>
              {["Pass","Fail","N/A"].map(opt=>(
                <button key={opt} onClick={()=>setCheckStates(p=>({...p,[label]:{...st,result:opt}}))} style={{
                  flex:1,padding:"4px 2px",border:"none",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:600,
                  background:st.result===opt?(opt==="Pass"?C.success:opt==="Fail"?C.danger:C.muted):(saved?.result===opt?(opt==="Pass"?C.success+"44":C.danger+"44":C.muted+"44"):C.bg),
                  color:st.result===opt?"#fff":C.muted,outline:st.result===opt?"none":`1px solid ${C.border}`,
                }}>{opt}</button>
              ))}
            </div>
            <input style={{...S.input,padding:"4px 8px",fontSize:12}} value={st.comment} placeholder={saved?.comment||"Comment…"} onChange={e=>setCheckStates(p=>({...p,[label]:{...st,comment:e.target.value}}))} />
            <button style={{...S.btn("accent",{fontSize:10,padding:"5px 10px"}),whiteSpace:"nowrap"}} disabled={!st.result||savingRow[label]}
              onClick={()=>doSave("QC Check",{label,result:st.result,comment:st.comment},()=>setCheckStates(p=>({...p,[label]:{result:"",comment:""}})))}>
              {savingRow[label]?"…":"💾 Save"}
            </button>
          </div>;
        })}
      </SC>
    )}
    <SC title="Overall Assessment">
      <div style={{display:"flex",gap:12,marginBottom:12}}>
        {["APPROVED","CONDITIONAL","REJECTED"].map(opt=>(
          <button key={opt} onClick={()=>setOverall(opt)} style={{
            flex:1,padding:"10px 0",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,
            background:overall===opt?(opt==="APPROVED"?C.success:opt==="REJECTED"?C.danger:C.warn):C.bg,
            color:overall===opt?"#fff":C.muted,outline:overall===opt?"none":`1px solid ${C.border}`,
          }}>{opt}</button>
        ))}
      </div>
      <TxnList txns={txns} section="Overall" session={session} deleteRow={deleteRow} columns={[{key:"result",label:"Result"},{key:"remark",label:"Note"}]} />
      <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
        <textarea style={{...S.input,minHeight:60,resize:"vertical",flex:1}} value={remark} onChange={e=>setRemark(e.target.value)} placeholder="Remarks…" />
        <button style={{...S.btn("accent",{fontSize:11,padding:"8px 14px"}),flexShrink:0,whiteSpace:"nowrap"}} disabled={!overall||savingRow["Overall"]}
          onClick={()=>doSave("Overall",{result:overall,remark},()=>{setRemark("");})}>
          {savingRow["Overall"]?"…":"💾 Save Assessment"}
        </button>
      </div>
    </SC>
  </div>;
}

// ── Records ───────────────────────────────────────────────────────────────────
const TYPE_LABELS = {
  production:"Production",viscosity:"Viscosity QC",printingqc:"Printing QC",
  lamination:"Lamination",laminationqc:"Lamination QC",
  extruder1:"Extruder 1",extruder1qc:"Extruder 1 QC",
  extruder2:"Extruder 2",extruder2qc:"Extruder 2 QC",
  slitting1:"Slitting 1",slitting1qc:"Slitting 1 QC",
  slitting2:"Slitting 2",slitting2qc:"Slitting 2 QC",
  bagmaking1:"Bag Making 1",bagmaking1qc:"Bag Making 1 QC",
  bagmaking2:"Bag Making 2",bagmaking2qc:"Bag Making 2 QC",
  bagmaking3:"Bag Making 3",bagmaking3qc:"Bag Making 3 QC",
  bagmaking4:"Bag Making 4",bagmaking4qc:"Bag Making 4 QC",
};

function Records({ records, session, onDelete, onSave, onReopen }) {
  const [filter,setFilter]   = useState("all");
  const [search,setSearch]   = useState("");
  const [expanded,setExpanded] = useState({});

  const filtered = records.filter(r => {
    const matchType = filter==="all" || r.type===filter;
    const matchSearch = !search ||
      r.title?.toLowerCase().includes(search.toLowerCase()) ||
      r.created_by?.toLowerCase().includes(search.toLowerCase());
    return matchType && matchSearch;
  });

  const toggle = id => setExpanded(p=>({...p,[id]:!p[id]}));
  const typeColor = t => t?.includes("qc")?"#e67e22":C.accent;
  const fmtDate = iso => iso ? new Date(iso).toLocaleDateString("en-ZA",{day:"2-digit",month:"short",year:"numeric"}) : "—";

  const exportExcel = () => {
    try {
      const wb = XLSX.utils.book_new();
      const allTypes = [...new Set(records.map(r=>r.type))];
      allTypes.forEach(t => {
        const rows = records.filter(r=>r.type===t);
        const data = rows.map(r => {
          const hdr = r.data?.header||{};
          const txns = r.data?.transactions||{};
          const flat = {...hdr};
          Object.entries(txns).forEach(([sec,arr])=>{
            (arr||[]).forEach((row,i)=>{
              Object.entries(row).forEach(([k,v])=>{ flat[`${sec} ${i+1} ${k}`]=v; });
            });
          });
          return {Title:r.title,By:r.created_by,Date:fmtDate(r.created_at),...flat};
        });
        if(data.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), (TYPE_LABELS[t]||t).substring(0,31));
      });
      XLSX.writeFile(wb, `Concord_Records_${todayStr()}.xlsx`);
    } catch(e) { alert("Export failed: "+e.message); }
  };

  const filterTypes = ["all",...Object.keys(TYPE_LABELS)];

  return <div>
    <PH title="All Records" sub={`${records.length} completed job cards`} />

    {/* Toolbar */}
    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <input style={{...S.input,flex:1,maxWidth:260}} placeholder="Search title or author…"
        value={search} onChange={e=>setSearch(e.target.value)} />
      <select style={{...S.input,width:"auto"}} value={filter} onChange={e=>setFilter(e.target.value)}>
        <option value="all">All types</option>
        {Object.entries(TYPE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
      </select>
      <button style={{...S.btn("ghost",{fontSize:12,padding:"7px 16px"}),flexShrink:0}}
        onClick={exportExcel}>⬇ Export Excel</button>
      <span style={{color:C.muted,fontSize:12,marginLeft:"auto"}}>{filtered.length} record{filtered.length!==1?"s":""}</span>
    </div>

    {filtered.length===0 && (
      <div style={{color:C.muted,fontSize:13,padding:32,textAlign:"center"}}>No records found.</div>
    )}

    {filtered.map(r => {
      const isOpen = expanded[r.id];
      const hdr = r.data?.header||{};
      const txns = r.data?.transactions||{};
      const txnCount = Object.values(txns).reduce((s,a)=>s+(a?.length||0),0);
      return (
        <div key={r.id} style={{...S.card,padding:0,overflow:"hidden",marginBottom:12}}>
          {/* Header row */}
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",userSelect:"none"}}
            onClick={()=>toggle(r.id)}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:11,fontWeight:700,color:typeColor(r.type),background:typeColor(r.type)+"22",padding:"1px 8px",borderRadius:4,flexShrink:0}}>
                  {TYPE_LABELS[r.type]||r.type}
                </span>
                <span style={{fontSize:13,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {r.title}
                </span>
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>
                {fmtDate(r.created_at)} · by {r.created_by}
                {txnCount>0&&<span> · {txnCount} transaction{txnCount!==1?"s":""}</span>}
                {r.data?.completionNote&&<span> · "{r.data.completionNote.substring(0,40)}{r.data.completionNote.length>40?"…":""}"</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
              {r.data?.jobCardId && session?.role==="admin" && (
                <button style={{fontSize:11,padding:"4px 10px",border:"none",borderRadius:4,cursor:"pointer",
                  background:C.warn+"22",color:C.warn,fontWeight:600}}
                  onClick={e=>{e.stopPropagation();onReopen&&onReopen(r.data.jobCardId,r.id);}}>
                  ↩ Reopen
                </button>
              )}
              {session?.role==="admin" && (
                <button style={{...S.btn("danger",{padding:"4px 10px",fontSize:11}),flexShrink:0}}
                  onClick={e=>{e.stopPropagation();onDelete(r.id);}}>✕ Delete</button>
              )}
              <span style={{color:C.muted,fontSize:14}}>{isOpen?"▲":"▼"}</span>
            </div>
          </div>

          {/* Expanded detail */}
          {isOpen && (
            <div style={{borderTop:`1px solid ${C.border}`,padding:"14px 16px",background:C.bg}}>
              {/* Header fields */}
              {Object.keys(hdr).length>0 && (
                <div style={{display:"flex",flexWrap:"wrap",gap:14,marginBottom:14,padding:"10px 12px",background:C.panel,borderRadius:6}}>
                  {Object.entries(hdr).filter(([k,v])=>v&&k!=="jobNo").map(([k,v])=>(
                    <div key={k}>
                      <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em"}}>{k.replace(/([A-Z])/g," $1")}</div>
                      <div style={{fontSize:12,color:C.text}}>{String(v)}</div>
                    </div>
                  ))}
                </div>
              )}
              {/* Transaction sections */}
              {Object.entries(txns).length===0 && (
                <div style={{color:C.muted,fontSize:12}}>No transaction data.</div>
              )}
              {Object.entries(txns).map(([section,rows])=>(
                <div key={section} style={{marginBottom:12}}>
                  <div style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}}>{section}</div>
                  {(rows||[]).map((row,i)=>(
                    <div key={i} style={{display:"flex",gap:10,flexWrap:"wrap",padding:"5px 8px",
                      background:i%2===0?C.panel:"transparent",borderRadius:4,fontSize:12}}>
                      {Object.entries(row).filter(([k,v])=>v!==null&&v!==undefined&&v!=="").map(([k,v])=>(
                        <span key={k}>
                          <span style={{color:C.muted,fontSize:10}}>{k}: </span>
                          <span style={{color:C.text}}>{String(v)}</span>
                        </span>
                      ))}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    })}
  </div>;
}

// ── User Management ───────────────────────────────────────────────────────────
const ALL_SHEET_OPTIONS = [
  {id:"dashboard",label:"Dashboard"},{id:"production",label:"Production"},
  {id:"viscosity",label:"Viscosity QC"},{id:"printingqc",label:"Printing QC"},
  {id:"lamination",label:"Lamination"},{id:"laminationqc",label:"Lamination QC"},
  {id:"extruder1",label:"Extruder 1"},{id:"extruder1qc",label:"Extruder 1 QC"},
  {id:"extruder2",label:"Extruder 2"},{id:"extruder2qc",label:"Extruder 2 QC"},
  {id:"slitting1",label:"Slitting 1"},{id:"slitting1qc",label:"Slitting 1 QC"},
  {id:"slitting2",label:"Slitting 2"},{id:"slitting2qc",label:"Slitting 2 QC"},
  {id:"bagmaking1",label:"Bag Making 1"},{id:"bagmaking1qc",label:"Bag Making 1 QC"},
  {id:"bagmaking2",label:"Bag Making 2"},{id:"bagmaking2qc",label:"Bag Making 2 QC"},
  {id:"bagmaking3",label:"Bag Making 3"},{id:"bagmaking3qc",label:"Bag Making 3 QC"},
  {id:"bagmaking4",label:"Bag Making 4"},{id:"bagmaking4qc",label:"Bag Making 4 QC"},
  {id:"records",label:"All Records"},{id:"lists",label:"Lists / Settings"},
  {id:"password",label:"Change Password"},
];

function UserMgmt({ users, session, reload, flash }) {
  const [form,setForm]     = useState({name:"",username:"",password:"",role:"operator"});
  const [adding,setAdding] = useState(false);
  const [editPerms,setEditPerms] = useState(null);  // user id being edited
  const [permDraft,setPermDraft] = useState({});
  const [resetId,setResetId]  = useState(null);
  const [newPw,setNewPw]      = useState("");
  const [err,setErr]           = useState("");

  const isAdmin = session?.role==="admin";
  const canManage = u => isAdmin && u.id !== session.id && u.role !== "admin";
  const canResetPw = u => isAdmin && u.id !== session.id;
  const canDelete  = u => isAdmin && u.id !== session.id && u.role !== "admin";

  const addUser = async () => {
    if (!form.name||!form.username||!form.password) { setErr("All fields required."); return; }
    if (users.find(u=>u.username.toLowerCase()===form.username.toLowerCase())) { setErr("Username already exists."); return; }
    const {error} = await dbAddUser({...form,permissions:null,created_at:new Date().toISOString()});
    if (error) { setErr(error.message); return; }
    setForm({name:"",username:"",password:"",role:"operator"});
    setAdding(false); setErr("");
    await reload(); flash("User added.");
  };

  const deleteUser = async (u) => {
    if (!window.confirm(`Delete user "${u.name}"? This cannot be undone.`)) return;
    await dbDelUser(u.id);
    await reload(); flash("User deleted.");
  };

  const savePerms = async (uid) => {
    await sb.from("users").update({permissions:permDraft}).eq("id",uid);
    await reload(); flash("Permissions saved."); setEditPerms(null);
  };

  const savePassword = async (uid) => {
    if (!newPw.trim()) return;
    await sb.from("users").update({password:newPw}).eq("id",uid);
    await reload(); flash("Password reset."); setResetId(null); setNewPw("");
  };

  const roleColor = r => r==="admin"?C.accent2:r==="manager"?C.accent:r==="qc"?C.blue:r==="viewer"?C.muted:C.success;

  return <div>
    <PH title="User Management" sub="Add users, set permissions and reset passwords." />

    {/* Add user */}
    <SC title="Add New User">
      {!adding ? (
        <button style={S.btn("accent",{fontSize:12,padding:"8px 18px"})} onClick={()=>setAdding(true)}>+ Add User</button>
      ) : (
        <div>
          <Grid cols={4}>
            <F label="Full Name"><TI value={form.name}     onChange={v=>setForm(p=>({...p,name:v}))} /></F>
            <F label="Username"><TI  value={form.username} onChange={v=>setForm(p=>({...p,username:v}))} /></F>
            <F label="Password"><TI  value={form.password} onChange={v=>setForm(p=>({...p,password:v}))} /></F>
            <F label="Role">
              <select style={S.input} value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))}>
                {["admin","manager","operator","qc","viewer"].map(r=><option key={r} value={r}>{r}</option>)}
              </select>
            </F>
          </Grid>
          {err && <div style={{color:C.danger,fontSize:12,marginTop:8}}>{err}</div>}
          <div style={{display:"flex",gap:10,marginTop:12}}>
            <button style={S.btn("accent",{fontSize:12,padding:"8px 20px"})} onClick={addUser}>Save User</button>
            <button style={S.btn("ghost",{fontSize:12,padding:"8px 16px"})} onClick={()=>{setAdding(false);setErr("");}}>Cancel</button>
          </div>
        </div>
      )}
    </SC>

    {/* Users list */}
    <SC title={`Users (${users.length})`}>
      {users.map(u=>(
        <div key={u.id} style={{borderBottom:`1px solid ${C.border}`,padding:"12px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:13,fontWeight:700,color:C.text}}>{u.name}</span>
                <span style={{fontSize:10,fontWeight:700,color:roleColor(u.role),
                  background:roleColor(u.role)+"22",padding:"1px 7px",borderRadius:4}}>
                  {u.role}
                </span>
                <span style={{fontSize:11,color:C.muted}}>{u.username}</span>
              </div>
              {/* Permission chips */}
              {u.permissions && (
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                  {ALL_SHEET_OPTIONS.filter(s=>u.permissions[s.id]).map(s=>(
                    <span key={s.id} style={{fontSize:9,padding:"1px 6px",borderRadius:3,
                      background:C.accent+"22",color:C.accent,fontWeight:700}}>
                      {s.label}
                    </span>
                  ))}
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:8,flexShrink:0}}>
              {canManage(u) && (
                <button style={S.btn("ghost",{fontSize:11,padding:"5px 12px"})}
                  onClick={()=>{ setEditPerms(editPerms===u.id?null:u.id); setPermDraft(u.permissions||{}); }}>
                  {editPerms===u.id?"Cancel":"✏ Permissions"}
                </button>
              )}
              {canResetPw(u) && (
                <button style={S.btn("ghost",{fontSize:11,padding:"5px 12px"})}
                  onClick={()=>{ setResetId(resetId===u.id?null:u.id); setNewPw(""); }}>
                  🔑 Reset PW
                </button>
              )}
              {canDelete(u) && (
                <button style={S.btn("danger",{fontSize:11,padding:"5px 12px"})}
                  onClick={()=>deleteUser(u)}>✕ Delete</button>
              )}
            </div>
          </div>

          {/* Edit Permissions */}
          {editPerms===u.id && (
            <div style={{marginTop:12,padding:14,background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>
              <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>
                Set accessible tabs for {u.name}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
                {ALL_SHEET_OPTIONS.map(s=>{
                  const on = !!permDraft[s.id];
                  return (
                    <button key={s.id}
                      style={{padding:"4px 10px",fontSize:11,fontWeight:600,border:"none",borderRadius:4,cursor:"pointer",
                        background:on?C.accent:C.panel,color:on?"#fff":C.muted,outline:on?"none":`1px solid ${C.border}`}}
                      onClick={()=>setPermDraft(p=>({...p,[s.id]:!on}))}>
                      {s.label}
                    </button>
                  );
                })}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={S.btn("accent",{fontSize:12,padding:"7px 20px"})} onClick={()=>savePerms(u.id)}>Save Permissions</button>
                <button style={S.btn("ghost",{fontSize:11,padding:"7px 14px"})}
                  onClick={()=>setPermDraft({})} title="Clear all">Clear All</button>
              </div>
            </div>
          )}

          {/* Reset Password */}
          {resetId===u.id && (
            <div style={{marginTop:10,display:"flex",gap:10,alignItems:"center"}}>
              <TI value={newPw} onChange={setNewPw} placeholder="New password…" />
              <button style={S.btn("accent",{fontSize:12,padding:"7px 16px"})} onClick={()=>savePassword(u.id)}>Save</button>
              <button style={S.btn("ghost",{fontSize:11,padding:"7px 12px"})} onClick={()=>setResetId(null)}>Cancel</button>
            </div>
          )}
        </div>
      ))}
    </SC>
  </div>;
}


// ── Login Log ─────────────────────────────────────────────────────────────────
function LoginLog({ loginLog }) {
  const [search, setSearch] = useState("");
  const [filterRole, setFilterRole] = useState("all");

  const filtered = loginLog.filter(e=>{
    const matchSearch = !search ||
      e.name?.toLowerCase().includes(search.toLowerCase()) ||
      e.username?.toLowerCase().includes(search.toLowerCase());
    const matchRole = filterRole==="all" || e.role===filterRole;
    return matchSearch && matchRole;
  });

  const rc = r=>r==="admin"?C.accent2:r==="manager"?C.accent:r==="qc"?C.blue:r==="viewer"?C.muted:C.success;

  const fmt = iso => {
    if (!iso) return "—";
    const d = new Date(iso);
    return d.toLocaleDateString("en-ZA",{day:"2-digit",month:"short",year:"numeric"}) +
      "  " + d.toLocaleTimeString("en-ZA",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  };

  return <div>
    <PH title="Login Log" sub="A record of every login — who, date and time. Admin access only." />

    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <input style={{...S.input,flex:1,maxWidth:280}} placeholder="Search by name or username…"
        value={search} onChange={e=>setSearch(e.target.value)} />
      <select style={{...S.input,width:"auto",paddingRight:12}} value={filterRole} onChange={e=>setFilterRole(e.target.value)}>
        <option value="all">All roles</option>
        <option value="admin">Admin</option>
        <option value="manager">Manager</option>
        <option value="operator">Operator</option>
        <option value="qc">QC Officer</option>
        <option value="viewer">Viewer</option>
      </select>
      <span style={{color:C.muted,fontSize:12,marginLeft:"auto"}}>{filtered.length} entr{filtered.length!==1?"ies":"y"}</span>
    </div>

    {/* Table */}
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr style={{background:C.panel,borderBottom:`2px solid ${C.border}`}}>
            {["#","Full Name","Username","Role","Date & Time"].map(h=>(
              <th key={h} style={{padding:"10px 14px",textAlign:"left",color:C.muted,fontWeight:700,fontSize:11,whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filtered.length===0 && (
            <tr><td colSpan={5} style={{padding:"40px",textAlign:"center",color:C.muted}}>
              {loginLog.length===0?"No logins recorded yet.":"No results for your search."}
            </td></tr>
          )}
          {filtered.map((e,i)=>(
            <tr key={e.id||i} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":C.panel+"66"}}>
              <td style={{padding:"10px 14px",color:C.muted,fontSize:11}}>{i+1}</td>
              <td style={{padding:"10px 14px",color:C.text,fontWeight:600}}>{e.name}</td>
              <td style={{padding:"10px 14px",color:C.muted,fontFamily:"'IBM Plex Mono',monospace",fontSize:12}}>{e.username}</td>
              <td style={{padding:"10px 14px"}}>
                <span style={{fontSize:10,padding:"2px 9px",borderRadius:4,background:rc(e.role)+"33",color:rc(e.role),fontWeight:700}}>
                  {(e.role||"").toUpperCase()}
                </span>
              </td>
              <td style={{padding:"10px 14px",color:C.text,fontFamily:"'IBM Plex Mono',monospace",fontSize:12,whiteSpace:"nowrap"}}>{fmt(e.logged_in_at)}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  </div>;
}

// ── Trash Bin ─────────────────────────────────────────────────────────────────
function TrashBin({ trashed, onRestore, onPermDelete }) {
  const [search, setSearch] = useState("");
  const [confirmId, setConfirmId] = useState(null);

  const filtered = trashed.filter(r=>
    r.title?.toLowerCase().includes(search.toLowerCase()) ||
    r.deleted_by?.toLowerCase().includes(search.toLowerCase()) ||
    r.type?.toLowerCase().includes(search.toLowerCase())
  );

  const typeColor = t=>t==="production"?C.accent:t==="viscosity"?C.blue:C.accent2;
  const typeLabel = t=>t==="production"?"PRODUCTION":t==="viscosity"?"VISCOSITY QC":"PRINTING QC";

  return <div>
    <PH title="Trash Bin" sub="Deleted records — restore or permanently remove. Only admins can view this." />

    <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
      <input style={{...S.input,flex:1,maxWidth:320}} placeholder="Search trash…" value={search} onChange={e=>setSearch(e.target.value)} />
      <span style={{color:C.muted,fontSize:12}}>{filtered.length} item{filtered.length!==1?"s":""}</span>
    </div>

    {filtered.length===0 && (
      <div style={{textAlign:"center",padding:"48px 0",color:C.muted,fontSize:13}}>
        <div style={{fontSize:40,marginBottom:8}}>🗑</div>
        {trashed.length===0 ? "Trash is empty." : "No results for your search."}
      </div>
    )}

    {filtered.map(r=>(
      <div key={r.id} style={{borderBottom:`1px solid ${C.border}`,padding:"14px 0"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:typeColor(r.type)+"33",color:typeColor(r.type),fontWeight:700}}>{typeLabel(r.type)}</span>
              <span style={{color:C.text,fontWeight:600,fontSize:13}}>{r.title}</span>
            </div>
            <div style={{fontSize:11,color:C.muted}}>
              Created by <span style={{color:C.text}}>{r.created_by}</span>
              {" · "}{r.created_at?new Date(r.created_at).toLocaleString():""}
            </div>
            <div style={{fontSize:11,color:C.danger,marginTop:2}}>
              🗑 Deleted by <span style={{color:C.text}}>{r.deleted_by}</span>
              {" · "}{r.deleted_at?new Date(r.deleted_at).toLocaleString():""}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
            <button style={S.btn("ghost",{padding:"5px 14px",fontSize:12,color:C.success,outline:`1px solid ${C.success}`})}
              onClick={()=>onRestore(r)}>↩ Restore</button>
            {confirmId===r.id ? (
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:11,color:C.danger}}>Sure?</span>
                <button style={S.btn("danger",{padding:"5px 12px",fontSize:12})} onClick={()=>{onPermDelete(r.id);setConfirmId(null);}}>Yes, Delete</button>
                <button style={S.btn("ghost",{padding:"5px 10px",fontSize:12})} onClick={()=>setConfirmId(null)}>Cancel</button>
              </div>
            ) : (
              <button style={S.btn("danger",{padding:"5px 14px",fontSize:12})} onClick={()=>setConfirmId(r.id)}>✕ Remove</button>
            )}
          </div>
        </div>
      </div>
    ))}
  </div>;
}

function ListsManager({ appLists, reload, flash }) {
  const [activeList, setActiveList] = useState("substrate");
  const [items,      setItems]      = useState([]);
  const [newVal,     setNewVal]     = useState("");
  const [newCode,    setNewCode]    = useState("");
  const [newDesc,    setNewDesc]    = useState("");
  const [saving,     setSaving]     = useState(false);

  const isInkCode   = activeList === "ink_code";
  const isChecklist = ["printing_qc_checks","lamination_qc_checks","extruder_qc_checks","slitting_qc_checks","bagmaking_qc_checks"].includes(activeList);

  React.useEffect(()=>{
    const raw = appLists[activeList] || [];
    if (isInkCode) {
      setItems(raw.map(x=> typeof x==="object" ? x : {code:String(x),description:""}));
    } else {
      setItems(raw.map(x=> typeof x==="object" ? (x.val||x.code||String(x)) : String(x)).map(v=>({val:v})));
    }
    setNewVal(""); setNewCode(""); setNewDesc("");
  }, [activeList, appLists]);

  const addItem = () => {
    if (isInkCode) {
      if (!newCode.trim()) return;
      setItems(prev=>[...prev, {code:newCode.trim(), description:newDesc.trim()}]);
      setNewCode(""); setNewDesc("");
    } else {
      if (!newVal.trim()) return;
      setItems(prev=>[...prev, {val:newVal.trim()}]);
      setNewVal("");
    }
  };

  const removeItem = i => setItems(prev=>prev.filter((_,x)=>x!==i));

  const editItem = (i, field, val) => {
    setItems(prev=>prev.map((item,x)=> x===i ? {...item,[field]:val} : item));
  };

  const moveItem = (i, dir) => {
    const next = [...items];
    const swap = i + dir;
    if (swap < 0 || swap >= next.length) return;
    [next[i], next[swap]] = [next[swap], next[i]];
    setItems(next);
  };

  const saveList = async () => {
    setSaving(true);
    const toSave = isInkCode
      ? items.map(x=>({code:x.code||"",description:x.description||""})).filter(x=>x.code)
      : items.map(x=>x.val||"").filter(Boolean);
    await dbUpsertList(activeList, JSON.stringify(toSave));
    await reload();
    flash("List saved!");
    setSaving(false);
  };

  const iStyle = {
    ...S.input, padding:"4px 8px", fontSize:12, flex:1,
    background:"transparent", border:`1px solid transparent`,
    transition:"border 0.15s",
  };
  const iStyleFocus = {...iStyle, border:`1px solid ${C.border}`};

  const listKeys = Object.keys(LIST_LABELS);

  return <div>
    <PH title="Lists / Settings" sub="Manage dropdown options and QC check items — click any item to edit it inline" />
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
      {listKeys.map(k=>(
        <button key={k} onClick={()=>setActiveList(k)} style={{
          padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
          background:activeList===k?C.accent:C.panel,
          color:activeList===k?"#fff":C.muted,
          outline:activeList===k?"none":`1px solid ${C.border}`,
          transition:"all 0.1s",
        }}>{LIST_LABELS[k]}</button>
      ))}
    </div>

    <SC title={LIST_LABELS[activeList]}>
      {isChecklist && (
        <div style={{fontSize:11,color:C.muted,marginBottom:10,padding:"8px 12px",background:C.bg,borderRadius:6,border:`1px solid ${C.border}`}}>
          📋 Check items appear as Pass / Fail / N/A rows in the form. Click any item to edit. Use ↑ ↓ to reorder. Save when done.
        </div>
      )}

      {items.length===0 && (
        <div style={{color:C.muted,fontSize:12,marginBottom:12}}>No items yet — add some below.</div>
      )}

      {items.map((item,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,padding:"4px 8px",background:C.bg,borderRadius:6,border:`1px solid ${C.border}`}}>

          {/* Row number for checklists */}
          {isChecklist && (
            <span style={{color:C.muted,fontSize:11,minWidth:22,textAlign:"center",flexShrink:0}}>{i+1}.</span>
          )}

          {/* Editable fields */}
          {isInkCode ? (
            <>
              <input
                style={{...iStyle,maxWidth:120,color:C.accent,fontWeight:700}}
                value={item.code}
                onChange={e=>editItem(i,"code",e.target.value)}
                onFocus={e=>e.target.style.border=`1px solid ${C.border}`}
                onBlur={e=>e.target.style.border="1px solid transparent"}
                placeholder="Code"
              />
              <span style={{color:C.muted,fontSize:11,flexShrink:0}}>—</span>
              <input
                style={{...iStyle,color:C.text}}
                value={item.description}
                onChange={e=>editItem(i,"description",e.target.value)}
                onFocus={e=>e.target.style.border=`1px solid ${C.border}`}
                onBlur={e=>e.target.style.border="1px solid transparent"}
                placeholder="Description"
              />
            </>
          ) : (
            <input
              style={{...iStyle,color:C.text}}
              value={item.val||""}
              onChange={e=>editItem(i,"val",e.target.value)}
              onFocus={e=>e.target.style.border=`1px solid ${C.border}`}
              onBlur={e=>e.target.style.border="1px solid transparent"}
              placeholder="Edit item…"
            />
          )}

          {/* Reorder buttons for checklists */}
          {isChecklist && (
            <div style={{display:"flex",gap:3,flexShrink:0}}>
              <button style={S.btn("ghost",{padding:"2px 7px",fontSize:11,opacity:i===0?0.25:1})} onClick={()=>moveItem(i,-1)} disabled={i===0}>↑</button>
              <button style={S.btn("ghost",{padding:"2px 7px",fontSize:11,opacity:i===items.length-1?0.25:1})} onClick={()=>moveItem(i,1)} disabled={i===items.length-1}>↓</button>
            </div>
          )}

          <button style={S.btn("danger",{padding:"2px 8px",fontSize:11,flexShrink:0})} onClick={()=>removeItem(i)}>✕</button>
        </div>
      ))}

      {/* Add new row */}
      <div style={{display:"flex",gap:8,marginTop:14,alignItems:"flex-end",paddingTop:10,borderTop:`1px solid ${C.border}`}}>
        {isInkCode ? (
          <>
            <F label="Code"><TI value={newCode} onChange={v=>setNewCode(v)} placeholder="e.g. INK-001" /></F>
            <F label="Description"><TI value={newDesc} onChange={v=>setNewDesc(v)} placeholder="e.g. Cyan Solvent" /></F>
          </>
        ) : (
          <F label={isChecklist ? "New check item" : "New item"}>
            <TI value={newVal} onChange={v=>setNewVal(v)}
              placeholder={isChecklist ? "e.g. Adhesive spread checked" : `Add ${LIST_LABELS[activeList]} option…`}
              onKeyDown={e=>e.key==="Enter"&&addItem()} />
          </F>
        )}
        <button style={{...S.btn("accent"),padding:"8px 18px",fontSize:12,flexShrink:0}} onClick={addItem}>+ Add</button>
      </div>
    </SC>

    <button style={{...S.btn("accent"),padding:"12px 32px",fontSize:14}} onClick={saveList} disabled={saving}>
      {saving?"Saving…":"💾 Save List"}
    </button>
    <div style={{color:C.muted,fontSize:11,marginTop:8}}>Click any item above to edit it. Changes take effect for all users after saving.</div>
  </div>;
}

function ChangePassword({ session, flash }) {
  const [current,setCurrent]=useState("");
  const [newPw,setNewPw]=useState("");
  const [confirm,setConfirm]=useState("");
  const [err,setErr]=useState("");
  const [done,setDone]=useState(false);

  const save = async () => {
    setErr("");
    // Verify current password against DB
    const {data} = await sb.from("users").select("password").eq("id",session.id).single();
    if (!data || data.password !== current) { setErr("Current password is incorrect."); return; }
    if (!newPw.trim()) { setErr("New password cannot be empty."); return; }
    if (newPw !== confirm) { setErr("New passwords do not match."); return; }
    if (newPw.length < 4) { setErr("Password must be at least 4 characters."); return; }
    const {error} = await sb.from("users").update({password:newPw}).eq("id",session.id);
    if (error) { setErr("Failed to update: "+error.message); return; }
    setCurrent(""); setNewPw(""); setConfirm(""); setDone(true);
    flash("Password changed successfully!");
    setTimeout(()=>setDone(false),3000);
  };

  return <div>
    <PH title="Change Password" sub={`Changing password for: ${session.name}`} />
    <div style={{...S.card,maxWidth:420}}>
      {done && <div style={{padding:"10px 14px",background:`${C.success}22`,border:`1px solid ${C.success}`,borderRadius:6,color:C.success,fontSize:13,fontWeight:600,marginBottom:16}}>
        ✓ Password changed successfully!
      </div>}
      <label style={S.label}>Current Password</label>
      <input type="password" style={{...S.input,marginBottom:14}} value={current} onChange={e=>setCurrent(e.target.value)} />
      <label style={S.label}>New Password</label>
      <input type="password" style={{...S.input,marginBottom:14}} value={newPw} onChange={e=>setNewPw(e.target.value)} />
      <label style={S.label}>Confirm New Password</label>
      <input type="password" style={{...S.input,marginBottom:16}} value={confirm} onChange={e=>setConfirm(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&save()} />
      {err && <div style={{color:C.danger,fontSize:12,marginBottom:12}}>{err}</div>}
      <button style={{...S.btn("accent"),width:"100%",padding:10}} onClick={save}>Update Password</button>
    </div>
  </div>;
}

// ── Debug Panel ───────────────────────────────────────────────────────────────
function DebugPanel({ records, users, session }) {
  const [copied, setCopied] = useState(false);

  const buildReport = () => {
    const lines = [];
    lines.push("=== CONCORD TRACEABILITY — DEBUG REPORT ===");
    lines.push(`Generated: ${new Date().toLocaleString()}`);
    lines.push(`Logged in as: ${session.name} (${session.role})`);
    lines.push(`Supabase URL: ${SUPABASE_URL}`);
    lines.push("");
    lines.push(`--- USERS (${users.length} total) ---`);
    users.forEach(u => lines.push(`  [${u.role}] ${u.name} — username: ${u.username} — id: ${u.id}`));
    lines.push("");
    lines.push(`--- RECORDS (${records.length} total) ---`);
    const byType = {production:0, viscosity:0, printingqc:0};
    records.forEach(r=>{ if(byType[r.type]!==undefined) byType[r.type]++; });
    lines.push(`  Production: ${byType.production}`);
    lines.push(`  Viscosity QC: ${byType.viscosity}`);
    lines.push(`  Printing QC: ${byType.printingqc}`);
    lines.push("");
    lines.push("--- LAST 5 RECORDS (full data) ---");
    records.slice(0,5).forEach((r,i) => {
      lines.push(`\n[${i+1}] ${r.title}`);
      lines.push(`  ID: ${r.id}`);
      lines.push(`  Type: ${r.type}`);
      lines.push(`  Completed by: ${r.created_by}`);
      lines.push(`  Created at: ${r.created_at}`);
      lines.push(`  Data: ${JSON.stringify(r.data, null, 2)}`);
    });
    lines.push("");
    lines.push("--- BROWSER INFO ---");
    lines.push(`  User Agent: ${navigator.userAgent}`);
    lines.push(`  URL: ${window.location.href}`);
    lines.push(`  Screen: ${window.screen.width}x${window.screen.height}`);
    lines.push("");
    lines.push("=== END OF REPORT ===");
    return lines.join("\n");
  };

  const report = buildReport();

  const copy = () => {
    navigator.clipboard.writeText(report).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2500); });
  };

  return <div>
    <PH title="Debug / AI Help" sub="Copy this report and paste it into Claude or any AI to get help" />
    <div style={{...S.card,marginBottom:16}}>
      <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.1em",marginBottom:12}}>HOW TO USE</div>
      <div style={{fontSize:13,color:C.text,lineHeight:2}}>
        1. Click <span style={{color:C.accent,fontWeight:700}}>Copy Report</span> below<br/>
        2. Open a new chat at <span style={{color:C.accent}}>claude.ai</span><br/>
        3. Paste the report and describe your problem<br/>
        4. Claude will understand the full app context and help you fix it
      </div>
    </div>
    <div style={{...S.card}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.1em"}}>REPORT PREVIEW</div>
        <button style={S.btn(copied?"ghost":"accent",{padding:"6px 18px",fontSize:12,background:copied?C.success:C.accent,color:"#fff"})} onClick={copy}>
          {copied ? "✓ Copied!" : "Copy Report"}
        </button>
      </div>
      <pre style={{
        background:C.bg, border:`1px solid ${C.border}`, borderRadius:6,
        padding:16, fontSize:11, color:C.muted, overflowX:"auto",
        maxHeight:480, overflowY:"auto", lineHeight:1.7, whiteSpace:"pre-wrap",
        wordBreak:"break-word"
      }}>{report}</pre>
    </div>
  </div>;
}
